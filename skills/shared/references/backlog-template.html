<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Backlog</title>
    <script src="/lib/themes.js"></script>
    <link rel="stylesheet" href="/css/backlog.css" />
    <link rel="stylesheet" href="/css/theme-picker.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  </head>
  <body>
    <script id="backlog-data" type="application/json">
      {
        "project": "E-commerce Dashboard",
        "generated": "2026-02-20",
        "updated": "2026-02-22",
        "source": "/thinking-concept",
        "overview": "Dashboard voor product management, orders, analytics en klantenbeheer",
        "features": [
          {
            "name": "routing",
            "type": "FEATURE",
            "status": "DONE",
            "phase": "P1",
            "description": "Next.js app router setup met pagina structuur",
            "dependency": null,
            "date": "2026-02-16"
          },
          {
            "name": "auth-pages",
            "type": "FEATURE",
            "status": "DONE",
            "phase": "P1",
            "description": "Login, registratie en wachtwoord reset flows",
            "dependency": "routing",
            "date": "2026-02-17"
          },
          {
            "name": "api-auth",
            "type": "API",
            "status": "DONE",
            "phase": "P1",
            "description": "JWT authenticatie endpoints met refresh tokens",
            "dependency": "auth-pages"
          },
          {
            "name": "dashboard-layout",
            "type": "FEATURE",
            "status": "DOING",
            "phase": "P1",
            "description": "Sidebar navigatie, header met user menu, content area",
            "dependency": "auth-pages"
          },
          {
            "name": "product-list",
            "type": "FEATURE",
            "status": "DOING",
            "phase": "P1",
            "description": "Tabel met producten, zoeken, filteren en paginatie",
            "dependency": "dashboard-layout"
          },
          {
            "name": "api-products",
            "type": "API",
            "status": "TODO",
            "phase": "P2",
            "description": "CRUD endpoints voor producten met image upload",
            "dependency": "product-list"
          },
          {
            "name": "product-detail",
            "type": "FEATURE",
            "status": "DOING",
            "phase": "P2",
            "description": "Product bewerk pagina met rich text editor",
            "dependency": "api-products"
          },
          {
            "name": "order-overview",
            "type": "FEATURE",
            "status": "TODO",
            "phase": "P2",
            "description": "Order lijst met status filters en zoeken",
            "dependency": "dashboard-layout"
          },
          {
            "name": "stripe-integration",
            "type": "INTEGRATION",
            "status": "TODO",
            "phase": "P2",
            "description": "Stripe checkout en webhook verwerking",
            "dependency": "api-products"
          },
          {
            "name": "analytics-dashboard",
            "type": "INTEGRATION",
            "status": "TODO",
            "phase": "P3",
            "description": "Revenue grafieken, top producten, conversie metrics",
            "dependency": "order-overview"
          },
          {
            "name": "dark-mode",
            "type": "UI",
            "status": "TODO",
            "phase": "P3",
            "description": "Dark/light mode toggle met system preference detectie",
            "dependency": null
          },
          {
            "name": "performance-optimization",
            "type": "REFACTOR",
            "status": "TODO",
            "phase": "P3",
            "description": "Image optimization, lazy loading, bundle splitting",
            "dependency": null
          },
          {
            "name": "order-processing",
            "type": "PAGE-GAP",
            "status": "TODO",
            "phase": "P4",
            "description": "Submit handler voor checkout form",
            "dependency": null,
            "source": "/frontend-design checkout — CheckoutForm [Bestelling plaatsen]"
          },
          {
            "name": "coupon-validation",
            "type": "PAGE-GAP",
            "status": "TODO",
            "phase": "P4",
            "description": "Coupon code validatie en korting berekening",
            "dependency": null,
            "source": "/frontend-design checkout — CouponInput [Toepassen]"
          }
        ],
        "notes": "Focus op core CRUD flow eerst. Stripe pas na stabiele product/order pipeline."
      }
    </script>

    <!-- Page structure -->
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="board-area">
        <nav class="top-nav">
          <input
            class="top-nav-search"
            id="search-input"
            placeholder="Zoeken..."
            oninput="render()"
          />
        </nav>
        <div id="board"></div>
      </main>
    </div>

    <!-- Modal: add/edit -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <h3 id="modal-title">Card toevoegen</h3>

        <label for="field-name">Naam</label>
        <input type="text" id="field-name" placeholder="feature-naam" />

        <label for="field-desc">Beschrijving</label>
        <textarea id="field-desc" placeholder="Korte beschrijving"></textarea>

        <div class="modal-row">
          <div>
            <label for="field-type">Type</label>
            <select id="field-type">
              <option value="FEATURE">FEATURE</option>
              <option value="API">API</option>
              <option value="INTEGRATION">INTEGRATION</option>
              <option value="UI">UI</option>
              <option value="REFACTOR">REFACTOR</option>
              <option value="PAGE">PAGE</option>
              <option value="COMPONENT">COMPONENT</option>
              <option value="THEME">THEME</option>
              <option value="A11Y">A11Y</option>
              <option value="PERF">PERF</option>
              <option value="PAGE-GAP">PAGE-GAP</option>
              <option value="BUG">BUG</option>
              <option value="CHANGE">CHANGE</option>
            </select>
          </div>
          <div>
            <label for="field-phase">Prioriteit</label>
            <select id="field-phase">
              <option value="P1">P1</option>
              <option value="P2">P2</option>
              <option value="P3">P3</option>
              <option value="P4">P4</option>
            </select>
          </div>
        </div>

        <label for="field-dep">Dependency (optioneel)</label>
        <input type="text" id="field-dep" placeholder="feature-naam" />

        <label for="field-assignee">Toewijzen aan (optioneel)</label>
        <input type="text" id="field-assignee" placeholder="naam teammate" />

        <div class="modal-buttons">
          <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
          <button class="btn-save" id="modal-save">Opslaan</button>
        </div>
      </div>
    </div>

    <!-- Modal: delete confirm -->
    <div class="modal-overlay" id="delete-modal">
      <div class="modal">
        <h3>Card verwijderen</h3>
        <p
          style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px"
        >
          Weet je zeker dat je
          <strong id="delete-name" style="color: var(--text)"></strong> wilt
          verwijderen?
        </p>
        <div class="modal-buttons">
          <button class="btn-cancel" onclick="closeDeleteModal()">
            Annuleren
          </button>
          <button class="btn-danger" id="delete-confirm">Verwijderen</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
      // ─── State ──────────────────────────────────────────────────────
      const fileRaw = document.getElementById("backlog-data").textContent;
      let data = JSON.parse(fileRaw);
      if (!data.features) data.features = [];

      const STATUSES = ["TODO", "DEFINED", "DOING", "DONE"];
      const STATUS_LABELS = {
        TODO: "To define",
        DEFINED: "To build",
        DOING: "To verify",
        DONE: "To refactor",
      };
      const TRANSITION_LABELS = {
        TODO: "defining",
        DEFINED: "building",
        DOING: "verifying",
        DONE: "refactoring",
      };
      const STATUS_COLORS = {
        TODO: "var(--todo)",
        DEFINED: "var(--defined)",
        DOING: "var(--doing)",
        DONE: "var(--done)",
      };
      const PHASE_CLASSES = {
        P1: "phase-p1",
        P2: "phase-p2",
        P3: "phase-p3",
        P4: "phase-p4",
      };

      const PRIMARY_TYPE = {
        FEATURE: "FEATURE",
        PAGE: "FEATURE",
        COMPONENT: "FEATURE",
        INTEGRATION: "FEATURE",
        UI: "FEATURE",
        API: "FEATURE",
        THEME: "FEATURE",
        A11Y: "FEATURE",
        BUG: "BUG",
        CHANGE: "CHANGE",
        PERF: "CHANGE",
        REFACTOR: "REFACTOR",
        "PAGE-GAP": "GAP",
      };

      const TYPE_ICONS = {
        FEATURE: { icon: "◆", cls: "type-feature" },
        BUG: { icon: "✕", cls: "type-bug" },
        CHANGE: { icon: "✎", cls: "type-change" },
        REFACTOR: { icon: "↻", cls: "type-refactor" },
        GAP: { icon: "□", cls: "type-gap" },
      };

      const SUB_TYPE_LABELS = {
        PAGE: "page",
        COMPONENT: "component",
        INTEGRATION: "integration",
        UI: "ui",
        API: "api",
        THEME: "theme",
        A11Y: "a11y",
        PERF: "perf",
        "PAGE-GAP": "gap",
      };

      const FRONTEND_TYPES = [
        "PAGE",
        "COMPONENT",
        "THEME",
        "A11Y",
        "PERF",
        "PAGE-GAP",
      ];

      // ─── Helpers ────────────────────────────────────────────────────
      function esc(str) {
        const d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }

      function md(s) {
        if (!s) return "";
        try {
          return marked.parse(s);
        } catch {
          return esc(s);
        }
      }

      function findItem(name) {
        const item = data.features.find((f) => f.name === name);
        if (item) return { item, list: "features" };
        return null;
      }

      function removeItem(name) {
        const fi = data.features.findIndex((f) => f.name === name);
        if (fi !== -1) data.features.splice(fi, 1);
      }

      function updateStatus(name, newStatus) {
        const found = findItem(name);
        if (!found) return;
        found.item.status = newStatus;
        delete found.item.stage;
        if (newStatus === "DONE") {
          found.item.date = new Date().toISOString().slice(0, 10);
        }
      }

      function syncJSON() {
        data.updated = new Date().toISOString().slice(0, 10);
        const el = document.getElementById("backlog-data");
        el.textContent = "\n" + JSON.stringify(data, null, 2) + "\n";
        saveToDisk();
      }

      const SAVE_URL = (() => {
        const p = location.pathname.replace(/\/+$/, "");
        return p ? p + "/save" : "/save";
      })();

      let saveTimer = null;
      function saveToDisk() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          try {
            const res = await fetch(SAVE_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });
            if (!res.ok) throw new Error("save failed");
          } catch {
            toast("Server niet bereikbaar — start: node serve-backlog.js");
          }
        }, 300);
      }

      function toast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("visible");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("visible"), 2000);
      }

      function openInVSCode(url, el) {
        const orig = el.style.color;
        el.style.color = "var(--text-dim)";
        fetch(url, { method: "POST" })
          .then((r) => r.json())
          .then((d) => {
            if (d.ok) {
              el.style.color = "var(--done)";
              setTimeout(() => (el.style.color = orig), 1000);
            } else {
              el.style.color = "var(--danger)";
              toast("Fout: " + (d.error || "onbekend"));
              setTimeout(() => (el.style.color = orig), 2000);
            }
          })
          .catch(() => {
            el.style.color = "var(--danger)";
            toast("Kon VS Code niet bereiken");
            setTimeout(() => (el.style.color = orig), 2000);
          });
      }

      function getNextSkill(f) {
        const isFrontend = FRONTEND_TYPES.includes(f.type);
        if (f.status === "TODO") return isFrontend ? "compose" : "define";
        if (f.status === "DEFINED") return isFrontend ? "compose" : "build";
        if (f.status === "DOING") return isFrontend ? "audit" : "verify";
        return null;
      }

      // ─── Render ─────────────────────────────────────────────────────
      function render() {
        // Update page header
        const title = document.getElementById("page-title");
        const subtitle = document.getElementById("page-subtitle");
        if (title) title.textContent = data.project || "Backlog";
        if (subtitle) subtitle.textContent = data.overview || "";

        // Build sidebar
        const sidebar = document.getElementById("sidebar");
        if (sidebar) {
          sidebar.innerHTML = STATUSES.map((status) => {
            const count = data.features.filter(
              (f) => f.status === status && !f.shipped,
            ).length;
            return `<a href="#${status.toLowerCase()}-section" class="sb-${status.toLowerCase()}" data-status="${status}">${esc(STATUS_LABELS[status] || status)}</a>`;
          }).join("");
        }

        // Build board
        const board = document.getElementById("board");
        if (!board) return;
        board.innerHTML = "";

        const searchTerm = (
          document.getElementById("search-input")?.value || ""
        ).toLowerCase();

        STATUSES.forEach((status) => {
          let items = data.features.filter(
            (f) => f.status === status && !f.shipped,
          );

          if (searchTerm) {
            items = items.filter(
              (f) =>
                f.name.toLowerCase().includes(searchTerm) ||
                (f.description || "").toLowerCase().includes(searchTerm),
            );
          }

          const section = document.createElement("section");
          section.className = "group";
          section.id = status.toLowerCase() + "-section";

          const header = document.createElement("div");
          header.className = "group-header";
          header.dataset.status = status;
          header.innerHTML = `<h2>${esc(STATUS_LABELS[status] || status)}</h2>`;

          header.addEventListener("click", () => {
            section.classList.toggle("collapsed");
          });

          section.appendChild(header);

          const body = document.createElement("div");
          body.className = "group-body";

          if (items.length === 0) {
            body.innerHTML = '<div class="empty">Geen items</div>';
          } else {
            const phaseOrder = ["P1", "P2", "P3", "P4", "—"];
            const phases = [...new Set(items.map((f) => f.phase || "—"))].sort(
              (a, b) => phaseOrder.indexOf(a) - phaseOrder.indexOf(b),
            );

            phases.forEach((phase) => {
              const phaseItems = items.filter(
                (f) => (f.phase || "—") === phase,
              );
              const phaseGroup = document.createElement("div");
              phaseGroup.className = "phase-group";

              const phaseHeader = document.createElement("header");
              phaseHeader.className = "phase-header";
              phaseHeader.innerHTML = `<svg class="phase-chevron" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>${esc(phase)}`;
              phaseHeader.onclick = () =>
                phaseGroup.classList.toggle("phase-collapsed");
              phaseGroup.appendChild(phaseHeader);

              phaseItems.forEach((f) => {
                phaseGroup.appendChild(renderRow(f));
              });

              body.appendChild(phaseGroup);
            });
          }

          section.appendChild(body);
          board.appendChild(section);
        });

        updateSidebarActive();
      }

      // ─── Row rendering ───────────────────────────────────────────────
      function renderRow(f) {
        const primaryType = PRIMARY_TYPE[f.type] || "FEATURE";
        const typeInfo = TYPE_ICONS[primaryType] || TYPE_ICONS.FEATURE;
        const subLabel = SUB_TYPE_LABELS[f.type] || null;

        let metaHtml = "";
        if (f.dependency) {
          const depFound = findItem(f.dependency);
          const depResolved = depFound && depFound.item.status === "DONE";
          if (!depResolved) {
            metaHtml += `<span class="dep-icon" title="Afhankelijk van ${esc(f.dependency)}">⊸ ${esc(f.dependency)}</span>`;
          }
        }
        if (f.auto && f.status !== "DONE") {
          metaHtml += `<span class="auto-badge">AUTO</span>`;
        }
        if (f.status === "DONE" && f.refactor) {
          if (f.refactor === "ROLLED_BACK") {
            metaHtml += `<span class="refactor-badge refactor-rollback">⚠ rolled back</span>`;
          } else {
            metaHtml += `<span class="refactor-badge refactor-done">✓ refactored</span>`;
          }
        }
        if (f.github_issue) {
          const ghNum = f.github_issue.match(/\/(\d+)$/);
          metaHtml += `<a class="card-gh-link" href="${esc(f.github_issue)}" target="_blank" rel="noopener" title="${esc(f.github_issue)}">#${ghNum ? ghNum[1] : "?"}</a>`;
        }

        const row = document.createElement("div");
        const isActive = !!f.transition;
        row.className = "row" + (isActive ? " row--active" : "");
        row.dataset.name = f.name;

        const copyVerb = getNextSkill(f);
        const copyPrefix =
          data.source && data.source.startsWith("/game") ? "game" : "dev";
        const copyCmd = copyVerb
          ? `/${copyPrefix}-${copyVerb} ${f.name}`
          : null;

        const actionBtnHtml = isActive
          ? `<button class="row-annuleer-btn" title="Annuleer">
              <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 2l12 12M14 2L2 14"/></svg>
             </button>`
          : `<button class="row-copy-btn ${typeInfo.cls}" title="${copyCmd || f.name}" data-cmd="${copyCmd || ""}">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M5 11H3.5A1.5 1.5 0 012 9.5v-7A1.5 1.5 0 013.5 1h7A1.5 1.5 0 0112 2.5V5"/></svg>
             </button>`;

        const editDeleteHtml =
          f.status === "TODO" || f.status === "DEFINED"
            ? `<button class="row-edit-btn" title="Bewerken">✎</button><button class="row-delete-btn" title="Verwijderen">✕</button>`
            : "";

        row.innerHTML = `<div class="row-summary">
          ${actionBtnHtml}
          <span class="row-name">${esc(f.name)}</span>
          ${isActive ? `<span class="row-transition-label">${esc(f.transition)}</span>` : ""}
          ${subLabel ? `<span class="row-sub-tag">${subLabel}</span>` : ""}
          ${f.description ? `<span class="row-desc">${esc(f.description)}</span>` : ""}
          <div class="row-meta">${metaHtml}</div>
          ${editDeleteHtml}
        </div>
        <div class="row-expand"></div>`;

        const summary = row.querySelector(".row-summary");
        const editBtn = row.querySelector(".row-edit-btn");
        const deleteBtn = row.querySelector(".row-delete-btn");
        let copyBtn = null;

        if (isActive) {
          const annuleerBtn = row.querySelector(".row-annuleer-btn");
          annuleerBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const found = findItem(f.name);
            if (found) {
              delete found.item.transition;
              syncJSON();
              render();
            }
          });
        } else {
          copyBtn = row.querySelector(".row-copy-btn");
          copyBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            const cmd = copyBtn.dataset.cmd;
            if (!cmd) return;
            navigator.clipboard.writeText(cmd).then(() => {
              const found = findItem(f.name);
              if (found) {
                found.item.transition = TRANSITION_LABELS[f.status] || "active";
                syncJSON();
                render();
              }
              toast("Gekopieerd: " + cmd);
            });
          });
        }

        if (editBtn)
          editBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            openEditModal(f.name);
          });
        if (deleteBtn)
          deleteBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            openDeleteModal(f.name);
          });

        summary.addEventListener("click", (e) => {
          if (copyBtn && (e.target === copyBtn || copyBtn.contains(e.target)))
            return;
          if (editBtn && (e.target === editBtn || editBtn.contains(e.target)))
            return;
          if (
            deleteBtn &&
            (e.target === deleteBtn || deleteBtn.contains(e.target))
          )
            return;
          if (f.status === "TODO") return;
          toggleRowExpand(row, f.name);
        });

        return row;
      }

      // ─── Inline expand ───────────────────────────────────────────────
      const featureDetailCache = {};

      async function toggleRowExpand(rowEl, name) {
        const isExpanded = rowEl.classList.contains("expanded");

        document.querySelectorAll(".row.expanded").forEach((r) => {
          if (r !== rowEl) r.classList.remove("expanded");
        });

        if (isExpanded) {
          rowEl.classList.remove("expanded");
          return;
        }

        const expandEl = rowEl.querySelector(".row-expand");

        if (!expandEl.dataset.loaded) {
          const found = findItem(name);
          if (!found) return;
          const f = found.item;

          let html = "";

          let detail = featureDetailCache[name];
          if (!detail) {
            const basePath = location.pathname
              .replace(/\/backlog\/?$/, "")
              .replace(/\/+$/, "");
            try {
              const res = await fetch(
                basePath + "/feature/" + encodeURIComponent(name),
              );
              if (res.ok) {
                detail = await res.json();
                featureDetailCache[name] = detail;
              }
            } catch {}
          }

          const status = f.status || "TODO";

          if (status === "TODO" || !detail) {
            if (f.dependency) {
              html += `<div class="expand-section"><div class="expand-label">Dependency</div><div class="expand-deps"><span class="expand-dep">${esc(f.dependency)}</span></div></div>`;
            }
            if (f.assignee) {
              html += `<div class="expand-section"><div class="expand-label">Toegewezen aan</div><div class="expand-summary">${esc(f.assignee)}</div></div>`;
            }
            if (f.source) {
              html += `<div class="expand-section"><div class="expand-label">Bron</div><div class="expand-summary">${esc(f.source)}</div></div>`;
            }
            if (f.date) {
              html += `<div class="expand-section"><div class="expand-label">Datum</div><div class="expand-summary">${esc(f.date)}</div></div>`;
            }
          } else if (status === "DEFINED") {
            if (f.dependency) {
              html += `<div class="expand-section"><div class="expand-label">Dependency</div><div class="expand-deps"><span class="expand-dep">${esc(f.dependency)}</span></div></div>`;
            }
            const reqs = detail.requirements || [];
            if (reqs.length) {
              const hasStatus = reqs.some(
                (r) => r.status && r.status !== "pending",
              );
              html += `<div class="expand-section"><div class="bk-section-label">Requirements (${reqs.length})</div><div class="bk-reqs">`;
              reqs.forEach((r) => {
                const statusCls =
                  r.status === "PASS"
                    ? " bk-req-status--pass"
                    : r.status === "FAIL"
                      ? " bk-req-status--fail"
                      : "";
                html += `<div class="bk-req-row">
                  <span class="bk-req-id">${esc(r.id)}</span>
                  <span class="bk-req-desc">${esc(r.description)}</span>
                  ${r.category ? `<span class="bk-req-cat">${esc(r.category)}</span>` : ""}
                  ${hasStatus && r.status && r.status !== "pending" ? `<span class="bk-req-status${statusCls}">${esc(r.status.toUpperCase())}</span>` : ""}
                </div>`;
              });
              html += `</div></div>`;
            }
          } else if (status === "DOING") {
            if (detail.build) {
              const b = detail.build;
              html += `<div class="expand-section"><div class="bk-build-meta"><span class="bk-build-kv"><span class="bk-build-key">Tests</span><span class="bk-build-val">${b.testsPass || 0}/${b.testsTotal || 0}</span></span></div></div>`;
            }
            const files = detail.files || [];
            if (files.length) {
              const icons = { create: "+", modify: "~", delete: "−" };
              const colors = {
                create: "var(--done)",
                modify: "var(--accent)",
                delete: "var(--danger)",
              };
              const basePath = location.pathname.replace(/\/backlog\/?$/, "");
              html += `<div class="expand-section"><div class="bk-section-label">Files (${files.length})</div><div class="bk-files">`;
              files.forEach((fFile) => {
                const openUrl =
                  basePath +
                  "/open/" +
                  encodeURIComponent(fFile.path).replace(/%2F/g, "/");
                html += `<div class="bk-file-row">
                  <span class="bk-file-action" style="color:${colors[fFile.action] || "var(--text-dim)"}">${icons[fFile.action] || "·"}</span>
                  <a class="bk-file-path" href="#" onclick="openInVSCode('${openUrl}',this);return false">${esc(fFile.path)}</a>
                </div>`;
              });
              html += `</div></div>`;
            }
          } else if (status === "DONE") {
            if (detail.build) {
              const b = detail.build;
              html += `<div class="expand-section"><div class="bk-build-meta"><span class="bk-build-kv"><span class="bk-build-key">Tests</span><span class="bk-build-val">${b.testsPass || 0}/${b.testsTotal || 0}</span></span></div>`;
              if (b.decisions && b.decisions.length) {
                html += `<ul class="bk-decisions">${b.decisions.map((d) => `<li>${esc(d)}</li>`).join("")}</ul>`;
              }
              html += `</div>`;
            }
            const ref = detail.refactor || {};
            if (ref.status) {
              const badge =
                ref.status === "ROLLED_BACK"
                  ? `<span class="refactor-badge refactor-rollback">⚠ ${esc(ref.status)}</span>`
                  : `<span class="refactor-badge refactor-done">✓ ${esc(ref.status)}</span>`;
              html += `<div class="expand-section">${badge}</div>`;
            }
          }

          if (!html) {
            html =
              '<div class="empty">Geen details beschikbaar — gebruik ⋮ voor acties</div>';
          }

          expandEl.innerHTML = html;
          expandEl.dataset.loaded = "1";
        }

        rowEl.classList.add("expanded");
      }

      // ─── Sidebar active state ───────────────────────────────────────
      function updateSidebarActive() {
        const sidebar = document.getElementById("sidebar");
        if (!sidebar) return;
        const links = sidebar.querySelectorAll("a[data-status]");
        const sections = document.querySelectorAll("section.group[id]");

        let activeStatus = null;
        sections.forEach((s) => {
          const rect = s.getBoundingClientRect();
          if (rect.top <= 140) {
            activeStatus = s.id.replace("-section", "").toUpperCase();
          }
        });

        if (!activeStatus && sections.length) {
          activeStatus = sections[0].id.replace("-section", "").toUpperCase();
        }

        links.forEach((link) => {
          link.classList.toggle("active", link.dataset.status === activeStatus);
        });
      }

      window.addEventListener("scroll", updateSidebarActive, { passive: true });

      // ─── Modal: Add / Edit ──────────────────────────────────────────
      let editingName = null;
      let addToStatus = null;

      function openAddModal(status) {
        editingName = null;
        addToStatus = status;
        document.getElementById("modal-title").textContent = "Card toevoegen";
        document.getElementById("field-name").value = "";
        document.getElementById("field-desc").value = "";
        document.getElementById("field-type").value = "FEATURE";
        document.getElementById("field-phase").value = "P1";
        document.getElementById("field-dep").value = "";
        document.getElementById("field-assignee").value = "";
        document.getElementById("field-name").disabled = false;
        document.getElementById("modal-save").textContent = "Toevoegen";
        document.getElementById("modal").classList.add("active");
        document.getElementById("field-name").focus();
      }

      function openEditModal(name) {
        const found = findItem(name);
        if (!found) return;
        editingName = name;
        addToStatus = null;
        document.getElementById("modal-title").textContent = "Card bewerken";
        document.getElementById("field-name").value = found.item.name;
        document.getElementById("field-desc").value =
          found.item.description || "";
        document.getElementById("field-type").value = found.item.type;
        document.getElementById("field-phase").value = found.item.phase || "P1";
        document.getElementById("field-dep").value =
          found.item.dependency || "";
        document.getElementById("field-assignee").value =
          found.item.assignee || "";
        document.getElementById("field-name").disabled = false;
        document.getElementById("modal-save").textContent = "Opslaan";
        document.getElementById("modal").classList.add("active");
        document.getElementById("field-name").focus();
      }

      function closeModal() {
        document.getElementById("modal").classList.remove("active");
        editingName = null;
        addToStatus = null;
      }

      document.getElementById("modal-save").addEventListener("click", () => {
        const name = document.getElementById("field-name").value.trim();
        const desc = document.getElementById("field-desc").value.trim();
        const type = document.getElementById("field-type").value;
        const phase = document.getElementById("field-phase").value;
        const dep = document.getElementById("field-dep").value.trim() || null;
        const assignee =
          document.getElementById("field-assignee").value.trim() || null;
        if (!name) return;

        if (editingName) {
          const found = findItem(editingName);
          if (!found) return;
          found.item.name = name;
          found.item.description = desc;
          found.item.type = type;
          found.item.phase = phase;
          found.item.dependency = dep;
          found.item.assignee = assignee;
          toast(name + " bijgewerkt");
        } else {
          data.features.push({
            name,
            type,
            status: addToStatus || "TODO",
            phase,
            description: desc,
            dependency: dep,
            assignee,
          });
          toast(name + " toegevoegd");
        }

        syncJSON();
        closeModal();
        render();
      });

      document.getElementById("modal").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
          e.preventDefault();
          document.getElementById("modal-save").click();
        }
        if (e.key === "Escape") closeModal();
      });

      // ─── Modal: Delete ──────────────────────────────────────────────
      let deletingName = null;

      function openDeleteModal(name) {
        deletingName = name;
        document.getElementById("delete-name").textContent = name;
        document.getElementById("delete-modal").classList.add("active");
      }

      function closeDeleteModal() {
        document.getElementById("delete-modal").classList.remove("active");
        deletingName = null;
      }

      document
        .getElementById("delete-confirm")
        .addEventListener("click", () => {
          if (!deletingName) return;
          const name = deletingName;
          removeItem(name);
          syncJSON();
          closeDeleteModal();
          render();
          toast(name + " verwijderd");
        });

      document
        .getElementById("delete-modal")
        .addEventListener("keydown", (e) => {
          if (e.key === "Escape") closeDeleteModal();
          if (e.key === "Enter") {
            e.preventDefault();
            document.getElementById("delete-confirm").click();
          }
        });

      // ─── (detail modal removed) ──────────────────────────────────────

      // Close modals on overlay click
      ["modal", "delete-modal"].forEach((id) => {
        const el = document.getElementById(id);
        el.addEventListener("click", (e) => {
          if (e.target === el) {
            if (id === "modal") closeModal();
            else closeDeleteModal();
          }
        });
      });

      // ─── Init ───────────────────────────────────────────────────────
      render();
    </script>
    <button
      id="back-to-top"
      onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
      title="Naar boven"
    >
      ↑
    </button>
    <script>
      (function () {
        const btn = document.getElementById("back-to-top");
        window.addEventListener(
          "scroll",
          () => {
            btn.classList.toggle("visible", window.scrollY > 300);
          },
          { passive: true },
        );
      })();
    </script>
  </body>
</html>
