    <script>
      // ─── Markdown ─────────────────────────────────────────
      function slugify(text) {
        return text
          .toLowerCase()
          .replace(/<[^>]*>/g, "")
          .replace(/[^\w\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-")
          .trim();
      }

      const renderer = new marked.Renderer();
      renderer.heading = function ({ text, depth }) {
        const id = slugify(text);
        return `<h${depth} id="${id}">${text}</h${depth}>`;
      };

      marked.setOptions({ breaks: true, gfm: true, renderer });

      function md(text) {
        if (!text) return "";
        // Strip YAML frontmatter (---...---) before rendering
        const stripped = text.replace(/^---\n[\s\S]*?\n---\n?/, "");
        return marked.parse(stripped);
      }

      // ─── State ──────────────────────────────────────────────
      const raw = document.getElementById("dashboard-data").textContent;
      let data = JSON.parse(raw);
      let modalContext = null;

      function getDashSearch() {
        return (document.getElementById("dash-search")?.value || "")
          .toLowerCase()
          .trim();
      }

      const TABS = [
        { id: "features", label: "Features" },
        { id: "architecture", label: "Architecture" },
        { id: "learnings", label: "Knowledge" },
        { id: "theme", label: "Design System" },
        { id: "stack", label: "Stack" },
        { id: "concept", label: "Concept" },
        { id: "config", label: "Config" },
      ];

      const EMPTY = {
        concept: {
          name: "",
          content: "",
        },
        architecture: {
          diagram: "",
          description: "",
        },
        design: {
          pages: [],
          flows: [],
          principles: [],
        },
        theme: {
          colors: { main: [], accent: [], semantic: [] },
          typography: {
            families: { heading: "", body: "", mono: "" },
            sizes: [],
          },
          spacing: { base: "", scale: [] },
          breakpoints: [],
          borderRadius: [],
          shadows: [],
          modes: {},
          cssVars: "",
        },
        stack: {
          framework: "",
          language: "",
          styling: "",
          db: "",
          auth: "",
          hosting: "",
          packages: [],
        },
        data: { entities: [] },
        endpoints: [],
      };

      // Ensure all sections exist
      for (const key of Object.keys(EMPTY)) {
        if (!data[key]) data[key] = JSON.parse(JSON.stringify(EMPTY[key]));
      }

      // ─── Helpers ────────────────────────────────────────────
      function esc(str) {
        const d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }

      function toast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("visible");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("visible"), 2000);
      }

      function openInVSCode(url, el) {
        const orig = el.style.color;
        el.style.color = "var(--text-dim)";
        fetch(url, { method: "POST" })
          .then((r) => r.json())
          .then((d) => {
            if (d.ok) {
              el.style.color = "var(--done)";
              setTimeout(() => (el.style.color = orig), 1000);
            } else {
              el.style.color = "var(--danger)";
              toast("Fout: " + (d.error || "onbekend"));
              setTimeout(() => (el.style.color = orig), 2000);
            }
          })
          .catch(() => {
            el.style.color = "var(--danger)";
            toast("Kon VS Code niet bereiken");
            setTimeout(() => (el.style.color = orig), 2000);
          });
      }

      const SAVE_URL = (() => {
        const p = location.pathname.replace(/\/+$/, "");
        return p ? p + "/save" : "/save";
      })();

      let saveTimer = null;
      function syncJSON() {
        const el = document.getElementById("dashboard-data");
        el.textContent = "\n" + JSON.stringify(data, null, 2) + "\n";
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          try {
            const res = await fetch(SAVE_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });
            if (!res.ok) throw new Error("save failed");
            toast("Opgeslagen");
          } catch {
            toast("Server niet bereikbaar");
          }
        }, 300);
      }

      // ─── Modal ──────────────────────────────────────────────
      // Anchor link navigation within modals (e.g. research TOC)
      document.getElementById("modal-body").addEventListener("click", (e) => {
        const a = e.target.closest("a[href^='#']");
        if (!a) return;
        e.preventDefault();
        const id = decodeURIComponent(a.getAttribute("href").slice(1));
        const target = document.getElementById(id);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      });

      function openModal(title, bodyHtml, ctx) {
        modalContext = ctx;
        document.getElementById("modal-title").textContent = title;
        document.getElementById("modal-body").innerHTML = bodyHtml;
        document.getElementById("modal-delete").style.display =
          ctx && ctx.deletable ? "" : "none";
        const isReadOnly = ctx && ctx.readOnly;
        document.getElementById("modal-save").style.display = isReadOnly
          ? "none"
          : "";
        document.querySelector("#modal .btn-cancel").textContent = isReadOnly
          ? "Sluiten"
          : "Annuleren";
        document.getElementById("modal").classList.add("active");
        if (isReadOnly) {
          document.querySelector("#modal .modal").style.maxWidth = ctx.wide
            ? "800px"
            : "";
        } else {
          document.querySelector("#modal .modal").style.maxWidth = "";
        }
        const first = document.querySelector(
          "#modal-body input, #modal-body textarea, #modal-body select",
        );
        if (first) first.focus();
      }

      function closeModal() {
        document.getElementById("modal").classList.remove("active");
        modalContext = null;
      }

      function handleModalSave() {
        if (modalContext && modalContext.onSave) {
          modalContext.onSave();
        }
        closeModal();
        syncJSON();
        render();
      }

      function handleModalDelete() {
        if (modalContext && modalContext.onDelete) {
          modalContext.onDelete();
        }
        closeModal();
        syncJSON();
        render();
      }

      document.getElementById("modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modal")) closeModal();
      });

      document.getElementById("modal").addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
        if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
          e.preventDefault();
          handleModalSave();
        }
      });

      // ─── Diagram Lightbox (pan & zoom) ─────────────────────
      (function () {
        const lb = document.getElementById("diagram-lightbox");
        const vp = document.getElementById("diagram-lightbox-viewport");
        const ct = document.getElementById("diagram-lightbox-content");
        let scale = 1,
          tx = 0,
          ty = 0,
          dragging = false,
          startX,
          startY;

        function apply() {
          ct.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
        }

        window.openDiagramLightbox = function () {
          const src = document.querySelector("#arch-diagram svg");
          if (!src) return;
          ct.innerHTML = "";
          const clone = src.cloneNode(true);
          const origId = src.getAttribute("id") || "arch-mermaid";
          const newId = origId + "-lb";
          clone.setAttribute("id", newId);
          clone.querySelectorAll("style").forEach((s) => {
            s.textContent = s.textContent.replaceAll("#" + origId, "#" + newId);
          });
          const vb = clone.getAttribute("viewBox");
          if (vb) {
            const [, , w, h] = vb.split(/\s+/).map(Number);
            clone.setAttribute("width", w);
            clone.setAttribute("height", h);
          }
          clone.style.maxWidth = "none";
          ct.appendChild(clone);
          lb.classList.add("active");
          document.body.style.overflow = "hidden";
          // fit diagram to viewport with padding
          const vpRect = vp.getBoundingClientRect();
          const pad = 40;
          const svgW =
            clone.getBoundingClientRect().width ||
            parseFloat(clone.getAttribute("width"));
          const svgH =
            clone.getBoundingClientRect().height ||
            parseFloat(clone.getAttribute("height"));
          scale = Math.min(
            (vpRect.width - pad * 2) / svgW,
            (vpRect.height - pad * 2) / svgH,
            1,
          );
          tx = (vpRect.width - svgW * scale) / 2;
          ty = (vpRect.height - svgH * scale) / 2;
          apply();
        };

        window.closeDiagramLightbox = function () {
          lb.classList.remove("active");
          document.body.style.overflow = "";
        };

        lb.addEventListener("click", (e) => {
          if (e.target === lb || e.target === vp) closeDiagramLightbox();
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && lb.classList.contains("active"))
            closeDiagramLightbox();
        });

        vp.addEventListener(
          "wheel",
          (e) => {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            const rect = vp.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            tx = mx - factor * (mx - tx);
            ty = my - factor * (my - ty);
            scale *= factor;
            apply();
          },
          { passive: false },
        );

        vp.addEventListener("mousedown", (e) => {
          if (e.button !== 0) return;
          dragging = true;
          startX = e.clientX - tx;
          startY = e.clientY - ty;
          vp.style.cursor = "grabbing";
        });

        window.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          tx = e.clientX - startX;
          ty = e.clientY - startY;
          apply();
        });

        window.addEventListener("mouseup", () => {
          dragging = false;
          vp.style.cursor = "grab";
        });
      })();

      // ─── Section Renderers ──────────────────────────────────

      function renderConcept() {
        const c = data.concept;
        if (!c.name && !c.content) {
          return `
            <div class="section-header">
              <h2>Concept</h2>
              <button class="edit-btn edit-btn--accent" onclick="editConcept()">+ Toevoegen</button>
            </div>
            <div class="empty-state"><p>Nog geen concept gedefinieerd.</p>
            <p style="color:var(--text-dim)">Wordt automatisch gevuld door <code>/dev-plan</code> of <code>/game-plan</code></p></div>`;
        }
        return `
          <div class="section-header">
            <h2>Concept</h2>
            <button class="header-icon-btn" onclick="editConcept()" title="Bewerken"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
          </div>
          <div class="concept-content">${md(c.content)}</div>`;
      }

      let _diagramRenderId = 0;
      let _diagramShowAll = localStorage.getItem("diagram-scope") !== "built";

      function filterDiagram(src, showAll) {
        if (showAll) return src;
        const lines = src.split("\n");
        const planned = new Set();
        for (const l of lines) {
          const m = l.match(/^\s*(\w+)[\[({].*:::planned/);
          if (m) planned.add(m[1]);
        }
        if (!planned.size) return src;
        // pass 1: remove planned nodes and their connections
        const filtered = lines.filter((l) => {
          if (/^\s*(classDef|graph|flowchart)\s/.test(l)) return true;
          if (/^\s*subgraph\s/.test(l) || /^\s*end\s*$/.test(l)) return true;
          for (const id of planned) {
            if (new RegExp("^\\s*" + id + "[\\[({]").test(l)) return false;
          }
          if (/-->|---|\.-|==>/.test(l)) {
            for (const id of planned) {
              if (new RegExp("(^|\\s)" + id + "(\\s|$|[\\[(-])").test(l))
                return false;
            }
          }
          return true;
        });
        // pass 2: remove empty subgraphs
        const result = [];
        let i = 0;
        while (i < filtered.length) {
          if (/^\s*subgraph\s/.test(filtered[i])) {
            let j = i + 1;
            while (j < filtered.length && !/^\s*end\s*$/.test(filtered[j])) j++;
            let hasContent = false;
            for (let k = i + 1; k < j; k++) {
              if (filtered[k].trim()) {
                hasContent = true;
                break;
              }
            }
            if (hasContent) {
              for (let k = i; k <= j; k++) result.push(filtered[k]);
            }
            i = j + 1;
          } else {
            result.push(filtered[i]);
            i++;
          }
        }
        return result.join("\n");
      }

      // ─── Code Cards ────────────────────────────────────

      function buildCodeCards() {
        const a = data.architecture || {};
        const components = a.components;
        if (!components || !components.length) return null;

        const reverseMap = {};
        components.forEach((c) => {
          (c.connects_to || []).forEach((edge) => {
            if (!reverseMap[edge.to]) reverseMap[edge.to] = [];
            reverseMap[edge.to].push({ name: c.name, type: edge.type });
          });
        });

        return components.map((c) => ({
          name: c.name,
          description: c.description || "",
          feature: c.feature || "",
          src: c.src || [],
          test: c.test || [],
          status: c.status || "done",
          group: c.layer || "Overig",
          endpoints: (c.endpoints || []).map((p) => {
            const parts = p.trim().split(/\s+/);
            const hasMethod =
              /^(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS)$/i.test(parts[0]);
            return {
              method: hasMethod ? parts[0].toUpperCase() : "GET",
              path: hasMethod ? parts.slice(1).join(" ") : p,
            };
          }),
          entities: (c.entities || []).map((e) => ({ name: e })),
          connections: {
            to: (c.connects_to || []).map((e) => ({
              name: e.to,
              type: e.type,
            })),
            from: reverseMap[c.name] || [],
          },
        }));
      }

      function toggleCard(card) {
        const wasExpanded = card.classList.contains("expanded");

        // Single pass: collapse others + clear highlights
        document.querySelectorAll(".code-card").forEach((c) => {
          if (c !== card) c.classList.remove("expanded");
          c.classList.remove(
            "code-card-dimmed",
            "code-card-connected",
            "code-card-connected--to",
            "code-card-connected--from",
          );
        });

        card.classList.toggle("expanded");

        if (!wasExpanded) {
          const connTo = new Set(
            (card.dataset.connTo || "").split(",").filter(Boolean),
          );
          const connFrom = new Set(
            (card.dataset.connFrom || "").split(",").filter(Boolean),
          );

          if (connTo.size || connFrom.size) {
            document.querySelectorAll(".code-card").forEach((c) => {
              if (c === card) return;
              const name = c.dataset.component;
              if (connTo.has(name)) {
                c.classList.add(
                  "code-card-connected",
                  "code-card-connected--to",
                );
              } else if (connFrom.has(name)) {
                c.classList.add(
                  "code-card-connected",
                  "code-card-connected--from",
                );
              } else {
                c.classList.add("code-card-dimmed");
              }
            });
          }
        }
      }

      let _archDiagramRendered = false;
      function toggleArchDiagram() {
        const el = document.getElementById("arch-diagram");
        const btn = document.querySelector(".arch-diagram-toggle");
        if (!el) return;
        const hidden = el.classList.toggle("architecture-diagram--hidden");
        if (btn) btn.classList.toggle("active", !hidden);
        if (!hidden && !_archDiagramRendered) {
          const a = data.architecture || {};
          if (a.diagram) {
            renderMermaidDiagram(a.diagram);
            _archDiagramRendered = true;
          }
        }
      }

      function highlightCard(chip) {
        const target = chip.dataset.target;
        if (!target) return;
        const card = document.querySelector(
          `.code-card[data-component="${target}"]`,
        );
        if (!card) {
          chip.classList.add("code-card-conn--dead");
          chip.title = "Geen card gevonden voor dit component";
          return;
        }
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        if (!card.classList.contains("expanded")) {
          toggleCard(card);
        }
      }

      function openFileInVSCode(filePath, el) {
        const url =
          location.pathname.replace(/\/$/, "") +
          "/open/" +
          encodeURIComponent(filePath).replace(/%2F/g, "/");
        openInVSCode(url, el);
      }

      function applyCodeCardFilter(showAll) {
        document.querySelectorAll(".code-card").forEach((card) => {
          card.classList.toggle(
            "code-card-hidden",
            !showAll && card.dataset.status === "planned",
          );
        });
        document.querySelectorAll(".code-cards-group").forEach((group) => {
          const visible = group.querySelectorAll(
            ".code-card:not(.code-card-hidden)",
          );
          group.style.display = visible.length ? "" : "none";
        });
      }

      const MAX_CONN_PER_DIR = 4;

      function renderConnChip(item, dir) {
        const typeBadge = item.type
          ? `<span class="code-card-conn-type">${esc(item.type)}</span>`
          : "";
        return `<span class="code-card-conn code-card-conn--${dir}" data-target="${esc(item.name.toLowerCase())}" onclick="highlightCard(this)">${esc(item.name)}${typeBadge}</span>`;
      }

      function renderConnGroup(items, dir, label) {
        if (!items.length) return "";
        const visible = items.slice(0, MAX_CONN_PER_DIR);
        const hidden = items.length - visible.length;
        return `<div class="code-card-conn-group">
          <span class="code-card-conn-label">${label}</span>
          <div class="code-card-conn-chips">
            ${visible.map((n) => renderConnChip(n, dir)).join("")}
            ${
              hidden > 0
                ? `<span class="code-card-conn code-card-conn--more" onclick="this.nextElementSibling.style.display='contents';this.remove()">+${hidden}</span><span style="display:none">${items
                    .slice(MAX_CONN_PER_DIR)
                    .map((n) => renderConnChip(n, dir))
                    .join("")}</span>`
                : ""
            }
          </div>
        </div>`;
      }

      function renderFileChip(path, isTest) {
        return `<span class="code-card-file${isTest ? " code-card-file--test" : ""}" data-path="${esc(path)}" onclick="openFileInVSCode(this.dataset.path, this)">${esc(path.split("/").pop())}</span>`;
      }

      function renderCodeCardsGrid(cards) {
        const grouped = {};
        cards.forEach((c) => {
          if (!grouped[c.group]) grouped[c.group] = [];
          grouped[c.group].push(c);
        });

        const layers = (data.architecture || {}).layers || [];
        const layerOrder = {};
        layers.forEach((l) => (layerOrder[l.name] = l.order || 99));

        const sortedGroups = Object.keys(grouped).sort((a, b) => {
          if (a === "Overig") return 1;
          if (b === "Overig") return -1;
          const oa = layerOrder[a];
          const ob = layerOrder[b];
          if (oa !== undefined && ob !== undefined) return oa - ob;
          if (oa !== undefined) return -1;
          if (ob !== undefined) return 1;
          return a.localeCompare(b);
        });

        return `<div class="code-cards" id="code-cards">${sortedGroups
          .map(
            (groupName) => `
          <div class="code-cards-group">
            ${groupName === "Overig" ? "" : `<h3 class="code-cards-group-title">${esc(groupName)}</h3>`}
            <div class="code-cards-grid">
              ${grouped[groupName].map((c) => renderCodeCard(c)).join("")}
            </div>
          </div>`,
          )
          .join("")}</div>`;
      }

      function renderCodeCard(c) {
        const counts = [];
        if (c.src.length)
          counts.push(
            `<span title="${c.src.length} bronbestand${c.src.length > 1 ? "en" : ""}">${c.src.length} src</span>`,
          );
        if (c.test.length)
          counts.push(
            `<span title="${c.test.length} test${c.test.length > 1 ? "s" : ""}">${c.test.length} tst</span>`,
          );
        if (c.endpoints.length)
          counts.push(
            `<span title="${c.endpoints.length} endpoint${c.endpoints.length > 1 ? "s" : ""}">${c.endpoints.length} ep</span>`,
          );

        const conn = c.connections || { to: [], from: [] };
        const hasConn = conn.to.length || conn.from.length;

        const hasDetail =
          c.src.length ||
          c.test.length ||
          c.endpoints.length ||
          c.entities.length ||
          hasConn;

        const connectionsHtml = hasConn
          ? `<div class="code-card-section"><h4>Verbindingen</h4><div class="code-card-connections">
              ${renderConnGroup(conn.from, "from", "Ontvangt van")}
              ${renderConnGroup(conn.to, "to", "Stuurt naar")}
            </div></div>`
          : "";

        const filesHtml =
          c.src.length || c.test.length
            ? `<div class="code-card-section"><h4>Bestanden</h4><div class="code-card-files">
              ${c.src.map((f) => renderFileChip(f, false)).join("")}
              ${c.test.map((f) => renderFileChip(f, true)).join("")}
            </div></div>`
            : "";

        const endpointsHtml = c.endpoints.length
          ? `<div class="code-card-section"><h4>Endpoints</h4><div class="code-card-endpoints">
              ${c.endpoints.map((ep) => `<div class="code-card-endpoint"><span class="badge badge-${(ep.method || "get").toLowerCase()}">${esc(ep.method || "GET")}</span> ${esc(ep.path)}</div>`).join("")}
            </div></div>`
          : "";

        const entitiesHtml = c.entities.length
          ? `<div class="code-card-section"><h4>Entiteiten</h4><div class="code-card-entities">
              ${c.entities.map((e) => `<span class="code-card-entity">${esc(e.name)}</span>`).join("")}
            </div></div>`
          : "";

        const connToLower = conn.to.map((e) => e.name.toLowerCase()).join(",");
        const connFromLower = conn.from
          .map((e) => e.name.toLowerCase())
          .join(",");

        return `
          <div class="code-card" data-status="${esc(c.status)}" data-component="${esc(c.name.toLowerCase())}" data-conn-to="${esc(connToLower)}" data-conn-from="${esc(connFromLower)}">
            <div class="code-card-header" onclick="toggleCard(this.closest('.code-card'))">
              <span class="code-card-status" data-status="${esc(c.status)}"></span>
              <span class="code-card-name">${esc(c.name)}</span>
              ${c.feature ? `<span class="code-card-feature">${esc(c.feature)}</span>` : ""}
              <span class="code-card-counts">${counts.join("")}</span>
              ${hasDetail ? `<span class="code-card-chevron">&#x203A;</span>` : ""}
            </div>
            ${c.description ? `<div class="code-card-desc">${esc(c.description)}</div>` : ""}
            ${hasDetail ? `<div class="code-card-detail">${connectionsHtml}${filesHtml}${endpointsHtml}${entitiesHtml}</div>` : ""}
          </div>`;
      }

      function renderMermaidDiagram(diagramSrc) {
        const el = document.getElementById("arch-diagram");
        if (!el || !diagramSrc) return;
        const filtered = filterDiagram(diagramSrc, _diagramShowAll);
        el.innerHTML = "";
        const id = "arch-mermaid-" + ++_diagramRenderId;
        mermaid
          .render(id, filtered)
          .then(({ svg }) => {
            el.innerHTML = svg;
            el.style.cursor = "pointer";
            el.title = "Klik om fullscreen te openen";
            el.onclick = () => openDiagramLightbox();
          })
          .catch((err) => {
            el.innerHTML = `<div class="architecture-error">Diagram fout: ${esc(err.message || String(err))}</div>`;
          });
      }

      function toggleDiagramScope(showAll) {
        _diagramShowAll = showAll;
        localStorage.setItem("diagram-scope", showAll ? "all" : "built");
        document
          .querySelectorAll(".arch-toggle button")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector(
            `.arch-toggle button[data-scope="${showAll ? "all" : "built"}"]`,
          )
          ?.classList.add("active");
        const a = data.architecture || {};
        if (a.diagram) renderMermaidDiagram(a.diagram);
        applyCodeCardFilter(showAll);
      }

      function renderArchitecture() {
        const a = data.architecture || {};
        const hasDiagram = a.diagram && a.diagram.trim();
        const cards = buildCodeCards();
        const hasCards = !!cards;
        const hasPlanned =
          hasCards && cards.some((c) => c.status === "planned");

        if (!hasCards && !hasDiagram) {
          return `
            <div class="section-header"><h2>Architecture</h2></div>
            <div class="empty-state"><p>Nog geen componenten gedefinieerd.</p>
            <p style="color:var(--text-dim)">Wordt gevuld door <code>/dev-define</code></p></div>`;
        }

        // Toolbar: filter toggle + optional diagram toggle
        const filterToggle = hasPlanned
          ? `<div class="arch-toggle">
              <button data-scope="all" class="${_diagramShowAll ? "active" : ""}" onclick="toggleDiagramScope(true)">Alles</button>
              <button data-scope="built" class="${!_diagramShowAll ? "active" : ""}" onclick="toggleDiagramScope(false)">Gebouwd</button>
            </div>`
          : "";

        const diagramToggle =
          hasDiagram && hasCards
            ? `<button class="arch-diagram-toggle" onclick="toggleArchDiagram()">Diagram</button>`
            : "";

        const splitClass =
          filterToggle && diagramToggle ? " arch-toolbar--split" : "";
        const toolbarHtml =
          filterToggle || diagramToggle
            ? `<div class="arch-toolbar${splitClass}">${filterToggle}${diagramToggle}</div>`
            : "";

        // Diagram: hidden by default when cards exist
        const diagramHidden = hasCards;
        const diagramHtml = hasDiagram
          ? `<div class="architecture-diagram${diagramHidden ? " architecture-diagram--hidden" : ""}" id="arch-diagram"></div>`
          : "";

        const dataFlowHtml =
          a.dataFlow && hasCards
            ? `<div class="code-cards-dataflow">${esc(a.dataFlow)}</div>`
            : "";

        let descHtml = "";

        if (hasDiagram) {
          setTimeout(() => renderMermaidDiagram(a.diagram), 0);
        }

        // Sub-sections: Routes, Components flat, API, Entities
        function archSubSection(label, count, bodyHtml) {
          if (!count) return "";
          const id = "arch-sub-" + label.toLowerCase().replace(/\s+/g, "-");
          return `
            <div class="arch-subsection">
              <div class="arch-subsection-header" onclick="(function(el){
                var body=el.nextElementSibling;
                var open=el.classList.toggle('collapsed');
                body.style.display=open?'none':'';
              })(this)">
                <span class="arch-subsection-label">${esc(label)}</span>
              </div>
              <div class="arch-subsection-body">${bodyHtml}</div>
            </div>`;
        }

        const routes = a.routes || [];
        const localUrl = data.localUrl || "http://localhost:3000";
        const normalizeAuth = (v) => {
          if (v === true) return "user";
          if (v === false || v == null) return "public";
          return v;
        };
        const routesHtml = routes.length
          ? routes
              .map((r) => {
                const auth = normalizeAuth(r.auth);
                const badge =
                  auth !== "public"
                    ? `<span class="route-auth-badge route-auth-badge--${auth}">${auth}</span>`
                    : "";
                const path = r.path || r.name || "";
                const protectedCls =
                  auth === "admin"
                    ? " arch-row--admin"
                    : auth !== "public"
                      ? " arch-row--protected"
                      : "";
                return `
            <div class="arch-row arch-row--route${protectedCls}">
              <a class="arch-row-path" href="${esc(localUrl)}${esc(path)}" target="_blank" rel="noopener">${esc(path)}</a>
              <span class="arch-row-meta">${esc(r.purpose || r.description || "")}</span>
              <span class="arch-row-badge-slot">${badge}</span>
            </div>`;
              })
              .join("")
          : "";

        const components = a.components || [];
        const componentsHtml = components.length
          ? components
              .map(
                (c) => `
            <div class="arch-row">
              <span class="arch-row-name">${esc(c.name)}</span>
              ${c.layer ? `<span class="arch-badge-layer">${esc(c.layer)}</span>` : ""}
              <span class="arch-row-meta">${esc(c.description || "")}</span>
            </div>`,
              )
              .join("")
          : "";

        const endpoints = data.endpoints || [];
        const methodColor = {
          GET: "var(--done)",
          POST: "var(--accent)",
          PUT: "var(--defined)",
          PATCH: "var(--defined)",
          DELETE: "var(--danger)",
        };
        const apiHtml = endpoints.length
          ? endpoints
              .map((e) => {
                const auth = normalizeAuth(e.auth);
                const badge =
                  auth !== "public"
                    ? `<span class="route-auth-badge route-auth-badge--${auth}">${auth}</span>`
                    : "";
                const protectedCls =
                  auth !== "public" ? " arch-row--protected" : "";
                return `
            <div class="arch-row${protectedCls}">
              <span style="font-family:var(--font-mono,'JetBrains Mono',monospace);font-size:10px;font-weight:700;width:46px;flex-shrink:0;color:${methodColor[e.method] || "var(--text-dim)"}">${esc(e.method || "")}</span>
              <span class="arch-row-path">${esc(e.path || "")}</span>
              <span class="arch-row-meta">${esc(e.description || "")}</span>
              ${badge}
            </div>`;
              })
              .join("")
          : "";

        const entities =
          data.data && data.data.entities ? data.data.entities : [];
        const entitiesHtml = entities.length
          ? entities
              .map(
                (e) => `
            <div class="arch-row">
              <span class="arch-row-name">${esc(e.name)}</span>
              <span class="arch-row-meta" style="font-family:var(--font-mono,'JetBrains Mono',monospace);font-size:10px">${(e.fields || []).map((f) => esc(f.name + (f.type ? ":" + f.type : ""))).join(", ")}</span>
            </div>`,
              )
              .join("")
          : "";

        const designFlows = (data.design || {}).flows || [];
        const flowsArchHtml = designFlows.length
          ? designFlows
              .map(
                (f, i) => `
            <div class="flow-card" id="arch-flow-${i}">
              <div class="flow-header" onclick="document.getElementById('arch-flow-${i}').classList.toggle('flow-open')">
                <svg class="flow-chevron" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="flow-name">${esc(f.name)}</span>
                ${f.description || f.notes ? `<span class="flow-desc-inline">${esc(f.description || f.notes || "")}</span>` : ""}
              </div>
              <div class="flow-body">
                ${f.steps && f.steps.length ? `<ol class="flow-steps">${f.steps.map((s) => `<li>${esc(s)}</li>`).join("")}</ol>` : ""}
              </div>
            </div>`,
              )
              .join("")
          : "";

        const subSectionsHtml = [
          archSubSection("Routes", routes.length, routesHtml),
          archSubSection("Components", components.length, componentsHtml),
          archSubSection("API", endpoints.length, apiHtml),
          archSubSection("Entities", entities.length, entitiesHtml),
          archSubSection("Flows", designFlows.length, flowsArchHtml),
        ].join("");

        return `
          <div class="section-header">
            <h2>Architecture</h2>
          </div>
          ${toolbarHtml}
          ${subSectionsHtml}
          ${dataFlowHtml}
          ${diagramHtml}
          ${descHtml}`;
      }

      function editArchitecture() {
        const a = data.architecture || {};
        const compJson = a.components
          ? JSON.stringify(a.components, null, 2)
          : "";
        const layersJson = a.layers ? JSON.stringify(a.layers, null, 2) : "";
        openModal(
          "Components bewerken",
          `
          <label>Data Flow</label>
          <input id="f-arch-dataflow" type="text" value="${esc(a.dataFlow || "")}" placeholder="Request → API → Service → Database" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-size:13px" />
          <label>Layers (JSON)</label>
          <textarea id="f-arch-layers" rows="4" style="font-family:var(--font-mono,'JetBrains Mono','Fira Code',monospace);font-size:12px;line-height:1.5" placeholder='[{"name":"API Laag","order":1}]'>${esc(layersJson)}</textarea>
          <label>Components (JSON)</label>
          <textarea id="f-arch-components" rows="16" style="font-family:var(--font-mono,'JetBrains Mono','Fira Code',monospace);font-size:12px;line-height:1.5" placeholder='[{"name":"...","layer":"...","status":"done","connects_to":[{"to":"OtherComponent","type":"calls"}]}]'>${esc(compJson)}</textarea>
          <label>Mermaid Diagram (optioneel)</label>
          <textarea id="f-arch-diagram" rows="6" style="font-family:var(--font-mono,'JetBrains Mono','Fira Code',monospace);font-size:12px;line-height:1.5">${esc(a.diagram || "")}</textarea>
        `,
          {
            wide: true,
            onSave() {
              data.architecture = data.architecture || {};
              data.architecture.dataFlow = document
                .getElementById("f-arch-dataflow")
                .value.trim();
              const lv = document.getElementById("f-arch-layers").value.trim();
              if (lv) {
                try {
                  data.architecture.layers = JSON.parse(lv);
                } catch (e) {
                  /* keep existing */
                }
              }
              const cv = document
                .getElementById("f-arch-components")
                .value.trim();
              if (cv) {
                try {
                  data.architecture.components = JSON.parse(cv);
                } catch (e) {
                  /* keep existing */
                }
              }
              data.architecture.diagram =
                document.getElementById("f-arch-diagram").value.trim() || "";
            },
          },
        );
      }

      function renderTheme() {
        const t = data.theme;
        const colors = t.colors || {};
        const typo = t.typography || {};
        const families = typo.families || {};
        const hasColors = Object.values(colors).some(
          (arr) => arr && arr.length,
        );
        const hasData = hasColors || families.heading || families.body;
        if (!hasData) {
          return `
            <div class="section-header"><h2>Design System</h2></div>
            <div class="empty-state"><p>Nog geen design tokens gedefinieerd.</p>
            <p style="color:var(--text-dim)">Design tokens, modes, CSS variables — beheerd via <code>/frontend-tokens</code></p></div>`;
        }

        // ── Colors ──
        function renderPalette(label, items) {
          if (!items || !items.length) return "";
          return `
            <div class="sg-section">
              <div class="sg-section-title">${esc(label)}</div>
              <div class="sg-palette">${items
                .map(
                  (c) => `
                <div class="sg-color">
                  <div class="sg-color-swatch" style="background:${esc(c.value)}"></div>
                  <div class="sg-color-info">
                    <div class="sg-color-token">${esc(c.token)}</div>
                    <div class="sg-color-value">${esc(c.value)}</div>
                    ${c.usage ? `<div class="sg-color-usage">${esc(c.usage)}</div>` : ""}
                  </div>
                </div>`,
                )
                .join("")}</div>
            </div>`;
        }
        const colorsHtml =
          renderPalette("Main Colors", colors.main) +
          renderPalette("Accent Colors", colors.accent) +
          renderPalette("Semantic Colors", colors.semantic);

        // ── Typography ──
        const specimenEntries = [
          { label: "Heading", family: families.heading },
          { label: "Body", family: families.body },
          { label: "Mono", family: families.mono },
        ].filter((e) => e.family);

        const specimensHtml = specimenEntries.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Typography</div>
            <div class="sg-font-specimens">${specimenEntries
              .map(
                (e) => `
              <div class="sg-font-card">
                <div class="sg-font-specimen" style="font-family:${esc(e.family)}">Aa</div>
                <div class="sg-font-name">${esc(e.label)}</div>
                <div class="sg-font-family">${esc(e.family)}</div>
              </div>`,
              )
              .join("")}</div>
          </div>`
          : "";

        // ── Border Radius ──
        const radii = t.borderRadius || [];
        const radiusHtml = radii.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Border Radius</div>
            <div class="sg-radius-grid">${radii
              .map(
                (r) => `
              <div class="sg-radius-item">
                <div class="sg-radius-box" style="border-radius:${esc(r.value)}"></div>
                <div class="sg-radius-label">${esc(r.token)}<br>${esc(r.value)}</div>
              </div>`,
              )
              .join("")}</div>
          </div>`
          : "";

        // ── Motion ──
        const motion = t.motion || {};
        const durations = motion.durations || [];
        const easings = motion.easings || [];
        const maxMs =
          durations.reduce(
            (m, d) => Math.max(m, parseInt(d.value) || 0),
            500,
          ) || 500;
        const motionHtml =
          durations.length || easings.length
            ? `
          <div class="sg-section">
            <div class="sg-section-title">Motion</div>
            ${
              durations.length
                ? `<div class="sg-motion-sub">Durations</div>
              <div class="sg-spacing-scale">
                ${durations
                  .map(
                    (d) => `
                <div class="sg-spacing-row">
                  <div class="sg-spacing-label">${esc(d.token)}</div>
                  <div class="sg-duration-bar" style="width:${Math.round(((parseInt(d.value) || 0) / maxMs) * 100)}%"></div>
                  <div class="sg-spacing-value">${esc(d.value)}${d.usage ? ` — ${esc(d.usage)}` : ""}</div>
                </div>`,
                  )
                  .join("")}
              </div>`
                : ""
            }
            ${
              easings.length
                ? `<div class="sg-motion-sub" style="margin-top:12px">Easings</div>
              <div class="sg-easing-list">
                ${easings
                  .map(
                    (e) => `
                <div class="sg-easing-row">
                  <span class="sg-easing-token">${esc(e.token)}</span>
                  <span class="sg-easing-value">${esc(e.value)}${e.usage ? ` <span class="sg-easing-usage">— ${esc(e.usage)}</span>` : ""}</span>
                </div>`,
                  )
                  .join("")}
              </div>`
                : ""
            }
          </div>`
            : "";

        // ── Interactions ──
        const ixn = t.interactions || {};
        const ixnEntries = [
          ixn.focusRing && {
            label: "Focus Ring",
            parts: [
              ixn.focusRing.width && `width: ${ixn.focusRing.width}`,
              ixn.focusRing.style && `style: ${ixn.focusRing.style}`,
              ixn.focusRing.offset && `offset: ${ixn.focusRing.offset}`,
              ixn.focusRing.color && `color: ${ixn.focusRing.color}`,
            ].filter(Boolean),
          },
          ixn.hover && {
            label: "Hover",
            parts: [
              ixn.hover.transition && `transition: ${ixn.hover.transition}`,
              ixn.hover.transform &&
                ixn.hover.transform !== "none" &&
                `transform: ${ixn.hover.transform}`,
            ].filter(Boolean),
          },
          ixn.active && {
            label: "Active",
            parts: [
              ixn.active.transform && `transform: ${ixn.active.transform}`,
            ].filter(Boolean),
          },
        ].filter((e) => e && e.parts.length);
        const interactionsHtml = ixnEntries.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Interactions</div>
            <div class="sg-interaction-list">
              ${ixnEntries
                .map(
                  (e) => `
              <div class="sg-interaction-row">
                <span class="sg-interaction-label">${esc(e.label)}</span>
                <span class="sg-interaction-value">${e.parts.map((p) => `<code>${esc(p)}</code>`).join("")}</span>
              </div>`,
                )
                .join("")}
            </div>
          </div>`
          : "";

        // ── Modes ──
        const modes = t.modes || {};
        const modeKeys = Object.keys(modes);
        const modesHtml = modeKeys.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Theme Modes</div>
            ${modeKeys
              .map(
                (k) => `
              <div style="margin-bottom:12px">
                <span class="tag" style="margin-bottom:6px;display:inline-block">${esc(k)}</span>
                <div class="code-block">${esc(modes[k])}</div>
              </div>`,
              )
              .join("")}
          </div>`
          : "";

        // ── CSS Variables ──
        const cssHtml = t.cssVars
          ? `
          <div class="sg-section">
            <div class="sg-section-title">CSS Variables</div>
            <div class="code-block">${esc(t.cssVars)}</div>
          </div>`
          : "";

        return `
          <div class="section-header"><h2>Design System</h2></div>
          ${colorsHtml}
          ${specimensHtml}
          ${radiusHtml}
          ${motionHtml}
          ${interactionsHtml}
          ${modesHtml}
          ${cssHtml}`;
      }

      function renderStack() {
        const s = data.stack;
        const hasData = s.framework || s.language;
        if (!hasData) {
          return `
            <div class="section-header">
              <h2>Stack</h2>
            </div>
            <div class="empty-state"><p>Nog geen stack gedefinieerd.</p>
            <p style="color:var(--text-dim)">Wordt automatisch gevuld door <code>/dev-plan</code></p></div>`;
        }
        const fields = [
          ["Framework", s.framework],
          ["Language", s.language],
          ["Styling", s.styling],
          ["Database", s.db],
          ["Auth", s.auth],
          ["Hosting", s.hosting],
        ].filter(([, v]) => v);

        const cards = fields
          .map(
            ([label, value]) => `
            <div class="stat-card">
              <div class="stat-label">${esc(label)}</div>
              <div class="stat-value">${esc(value)}</div>
            </div>`,
          )
          .join("");

        const pkgs = (s.packages || [])
          .map((p) => {
            if (typeof p === "string") {
              const lastAt = p.lastIndexOf("@");
              const name = lastAt > 0 ? p.slice(0, lastAt) : p;
              const version = lastAt > 0 ? p.slice(lastAt + 1) : "";
              p = { name, version, purpose: "" };
            }
            return `
            <tr>
              <td style="font-weight:500;color:var(--text)">${esc(p.name)}</td>
              <td style="font-family:monospace">${esc(p.version)}</td>
              <td>${esc(p.purpose)}</td>
            </tr>`;
          })
          .join("");

        return `
          <div class="section-header">
            <h2>Stack</h2>
            <button class="header-icon-btn" onclick="showResearch()" title="Research"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
          </div>
          <div class="grid-3">${cards}</div>
          ${
            s.packages && s.packages.length
              ? `
            <div class="sub-heading">Packages</div>
            <table class="data-table">
              <thead><tr><th>Naam</th><th>Versie</th><th>Doel</th></tr></thead>
              <tbody>${pkgs}</tbody>
            </table>`
              : ""
          }`;
      }

      // ─── Edit Modals ───────────────────────────────────────

      function editConcept() {
        const c = data.concept;
        openModal(
          "Concept bewerken",
          `
          <label>Naam</label>
          <input type="text" id="f-name" value="${esc(c.name)}" />
          <label>Concept (Markdown)</label>
          <textarea id="f-content" rows="20" style="font-family:var(--font-mono);font-size:12px;line-height:1.5">${esc(c.content)}</textarea>
        `,
          {
            onSave() {
              data.concept.name = document
                .getElementById("f-name")
                .value.trim();
              data.concept.content = document.getElementById("f-content").value;
            },
          },
        );
      }

      async function showResearch() {
        try {
          const basePath = location.pathname.replace(/\/+$/, "");
          const resp = await fetch(`${basePath}/research`);
          const research = await resp.json();

          if (!research.stack && !research.architecture) {
            openModal(
              "Stack Research",
              `
              <div class="empty-state" style="margin:0">
                <p>Geen research beschikbaar.</p>
                <p style="color:var(--text-dim)">Wordt gegenereerd door <code>/core-setup</code> Phase 7</p>
              </div>
            `,
              { readOnly: true },
            );
            return;
          }

          let content = "";
          if (research.stack) {
            content += `<div class="research-content">${md(research.stack)}</div>`;
          }
          if (research.architecture) {
            content += `<h3 style="margin-top:24px;color:var(--text)">Architecture Baseline</h3>
              <div class="research-content">${md(research.architecture)}</div>`;
          }

          openModal("Stack Research", content, { readOnly: true, wide: true });
        } catch (e) {
          openModal(
            "Fout",
            `<p>Kon research niet laden: ${esc(e.message)}</p>`,
            { readOnly: true },
          );
        }
      }

      // ─── Config (CLAUDE.md) ────────────────────────────────

      let configCache = null;
      let configEditing = false;

      function renderConfig() {
        const base = location.pathname.replace(/\/+$/, "");

        if (configCache === null) {
          fetch(base + "/claude-md")
            .then((r) => r.json())
            .then((d) => {
              configCache = d.content || "";
              const el = document.getElementById("config");
              if (el) el.innerHTML = renderConfig();
            })
            .catch(() => {
              configCache = "";
            });
          return '<div style="padding:40px;color:var(--text-dim)">Laden...</div>';
        }

        if (configEditing) {
          return `
            <div class="section-header">
              <h2>CLAUDE.md</h2>
              <div style="display:flex;gap:8px">
                <button id="config-save" class="edit-btn edit-btn--accent">Opslaan</button>
                <button id="config-cancel" class="edit-btn">Annuleren</button>
              </div>
            </div>
            <textarea id="config-editor" style="width:100%;min-height:500px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:monospace;font-size:13px;line-height:1.6;resize:vertical;tab-size:2">${esc(configCache)}</textarea>`;
        }

        if (!configCache) {
          return `
            <div class="section-header">
              <h2>CLAUDE.md</h2>
              <button id="config-create" class="edit-btn edit-btn--accent">+ Aanmaken</button>
            </div>
            <div class="empty-state">
              <p>Geen .claude/CLAUDE.md gevonden</p>
            </div>`;
        }

        return `
          <div class="section-header">
            <h2>CLAUDE.md</h2>
            <button id="config-edit" class="header-icon-btn" title="Bewerken"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
          </div>
          <div class="research-content">${md(configCache)}</div>`;
      }

      document.addEventListener("click", (e) => {
        const base = location.pathname.replace(/\/+$/, "");

        if (e.target.id === "config-edit") {
          configEditing = true;
          render();
          return;
        }

        if (e.target.id === "config-cancel") {
          configEditing = false;
          render();
          return;
        }

        if (e.target.id === "config-create") {
          configCache = "# " + (data.concept.name || "Project") + "\n\n";
          configEditing = true;
          render();
          return;
        }

        if (e.target.id === "config-save") {
          const textarea = document.getElementById("config-editor");
          if (!textarea) return;
          const content = textarea.value;
          fetch(base + "/claude-md", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content }),
          })
            .then((r) => r.json())
            .then((d) => {
              if (d.ok) {
                configCache = content;
                configEditing = false;
                render();
              }
            })
            .catch((err) => alert("Opslaan mislukt: " + err.message));
          return;
        }
      });

      // ─── Render ─────────────────────────────────────────────

      const TYPE_ICONS = {
        FEATURE: "◆",
        API: "⬡",
        INTEGRATION: "⟳",
        UI: "▣",
        REFACTOR: "↺",
        PAGE: "▤",
        COMPONENT: "⬡",
        THEME: "◐",
        A11Y: "♿",
        PERF: "⚡",
        CHANGE: "~",
        BUG: "✕",
      };

      const featureDetailCache = {};

      function buildFeatureDetailHtml(detail) {
        let html = "";

        const files = detail.files || [];
        if (files.length) {
          const icons = { create: "+", modify: "~", delete: "−" };
          const colors = {
            create: "var(--done)",
            modify: "var(--accent)",
            delete: "var(--danger)",
          };
          html += `<div class="fm-section"><h4>Files (${files.length})</h4><div class="fm-files">`;
          files.forEach((f) => {
            const from = f.lineFrom || null;
            const to = f.lineTo || null;
            const rangeAttr =
              from && to ? ` data-from="${from}" data-to="${to}"` : "";
            html += `<div class="fm-file" data-path="${esc(f.path)}"${rangeAttr}>
              <div class="fm-file-row" onclick="toggleSnippet(this)" style="cursor:pointer">
                <span class="fm-file-action" style="color:${colors[f.action] || "var(--text-dim)"}">${icons[f.action] || "·"}</span>
                <span class="fm-file-path">${esc(f.path)}</span>
              </div>
              <div class="fm-snippet" style="display:none"></div>
            </div>`;
          });
          html += `</div></div>`;
        }

        const reqs = detail.requirements || [];
        if (reqs.length) {
          const hasStatus = reqs.some(
            (r) => r.status && r.status !== "pending",
          );
          const rows = reqs
            .map((r) => {
              const statusCls =
                r.status === "PASS"
                  ? " fm-req-status--pass"
                  : r.status === "FAIL"
                    ? " fm-req-status--fail"
                    : "";
              return `<div class="fm-req-row">
                <span class="fm-req-id">${esc(r.id)}</span>
                <div class="fm-req-body">
                  <span class="fm-req-desc">${esc(r.description)}</span>
                  ${r.technique ? `<span class="fm-req-tech">${esc(r.technique)}</span>` : ""}
                </div>
                ${r.category ? `<span class="fm-req-cat">${esc(r.category)}</span>` : ""}
                ${hasStatus && r.status && r.status !== "pending" ? `<span class="fm-req-status${statusCls}">${esc(r.status.toUpperCase())}</span>` : ""}
              </div>`;
            })
            .join("");
          html += `<div class="fm-section"><h4>Requirements (${reqs.length})</h4><div class="fm-reqs">${rows}</div></div>`;
        }

        if (detail.build) {
          const b = detail.build;
          const testsMeta = `<span class="fm-build-kv"><span class="fm-build-key">Tests</span><span class="fm-build-val">${b.testsPass || 0}/${b.testsTotal || 0}</span></span>`;
          html += `<div class="fm-section"><div class="fm-build-meta">${testsMeta}</div>`;
          if (b.decisions && b.decisions.length)
            html += `<ul class="fm-decisions">${b.decisions.map((d) => `<li>${esc(d)}</li>`).join("")}</ul>`;
          if (b.explanation)
            html += `<p class="fm-explanation">${esc(b.explanation)}</p>`;
          html += `</div>`;
        }

        const arch = detail.architecture || {};
        if (arch.componentTree || (arch.interfaces && arch.interfaces.length)) {
          html += `<div class="fm-section"><h4>Architectuur</h4>`;
          if (arch.componentTree)
            html += `<pre class="fm-tree">${esc(arch.componentTree)}</pre>`;
          if (arch.interfaces && arch.interfaces.length) {
            html += `<div class="fm-interfaces">`;
            arch.interfaces.forEach((i) => {
              html += `<div class="fm-interface"><span class="fm-iface-name">${esc(i.name)}</span><code class="fm-iface-def">${esc(i.definition)}</code></div>`;
            });
            html += `</div>`;
          }
          html += `</div>`;
        }

        const ref = detail.refactor || {};
        if (ref.status) {
          const badge =
            ref.status === "ROLLED_BACK"
              ? `<span class="refactor-badge refactor-rollback">⚠ ${esc(ref.status)}</span>`
              : `<span class="refactor-badge refactor-done">✓ ${esc(ref.status)}</span>`;
          html += `<div class="fm-section fm-refactor-row">${badge}`;
          if (ref.improvements) {
            const cats = Object.entries(ref.improvements).filter(
              ([, v]) => v && (Array.isArray(v) ? v.length : true),
            );
            if (cats.length)
              html += `<span class="fm-ref-cats">${cats.map(([k]) => esc(k)).join(" · ")}</span>`;
          }
          html += `</div>`;
        }

        return html;
      }

      async function openFeatureModal(name) {
        const modal = document.getElementById("feature-modal");
        const title = document.getElementById("feature-modal-title");
        const body = document.getElementById("feature-modal-body");
        if (!modal) return;

        title.textContent = name;
        body.innerHTML = '<div class="fm-loading">Laden…</div>';
        modal.classList.add("active");

        let detail = featureDetailCache[name];
        if (!detail) {
          try {
            const base = location.pathname
              .replace(/\/dashboard\/?$/, "")
              .replace(/\/+$/, "");
            const res = await fetch(
              base + "/feature/" + encodeURIComponent(name),
            );
            if (res.ok) {
              detail = await res.json();
              featureDetailCache[name] = detail;
            }
          } catch {}
        }

        body.innerHTML = detail
          ? buildFeatureDetailHtml(detail)
          : '<p style="color:var(--text-dim)">Geen feature.json gevonden.</p>';
      }

      async function toggleDashFeature(summaryEl, name) {
        const rowEl = summaryEl.closest(".feat-row");
        if (!rowEl) return;
        const expandEl = rowEl.querySelector(".feat-expand");
        const isOpen = rowEl.classList.contains("expanded");
        if (isOpen) {
          rowEl.classList.remove("expanded");
          expandEl.style.display = "none";
          return;
        }
        rowEl.classList.add("expanded");
        expandEl.style.display = "block";
        if (expandEl.dataset.loaded) return;

        expandEl.innerHTML =
          '<div style="padding:12px 0 4px;color:var(--text-dim);font-size:12px">Laden…</div>';
        let detail = featureDetailCache[name];
        if (!detail) {
          try {
            const base = location.pathname
              .replace(/\/dashboard\/?$/, "")
              .replace(/\/+$/, "");
            const res = await fetch(
              base + "/feature/" + encodeURIComponent(name),
            );
            if (res.ok) {
              detail = await res.json();
              featureDetailCache[name] = detail;
            }
          } catch {}
        }
        if (
          detail &&
          (detail.summary ||
            detail.files ||
            detail.requirements ||
            detail.build)
        ) {
          expandEl.innerHTML = buildFeatureDetailHtml(detail);
          expandEl.dataset.loaded = "1";
        } else {
          expandEl.innerHTML =
            '<div style="padding:8px 0;color:var(--text-dim);font-size:12px">Geen detail beschikbaar.</div>';
          expandEl.dataset.loaded = "1";
        }
      }

      async function toggleSnippet(rowEl) {
        const fileEl = rowEl.closest(".fm-file");
        const snippetEl = fileEl.querySelector(".fm-snippet");
        if (!snippetEl) return;

        if (snippetEl.style.display !== "none") {
          snippetEl.style.display = "none";
          rowEl.classList.remove("active");
          return;
        }

        const path = fileEl.dataset.path;
        const from = fileEl.dataset.from;
        const to = fileEl.dataset.to;

        if (!snippetEl.dataset.loaded) {
          snippetEl.innerHTML =
            '<span style="color:var(--text-dim);font-size:11px">Laden…</span>';
          snippetEl.style.display = "block";
          try {
            const base = location.pathname
              .replace(/\/dashboard\/?$/, "")
              .replace(/\/+$/, "");
            let url = base + "/file?path=" + encodeURIComponent(path);
            if (from) url += "&from=" + from;
            if (to) url += "&to=" + to;
            const res = await fetch(url);
            if (res.ok) {
              const d = await res.json();
              const driftWarning =
                d.sha &&
                fileEl.dataset.shippedSha &&
                d.sha !== fileEl.dataset.shippedSha
                  ? `<div class="fm-drift-warning">⚠ Bestand gewijzigd na shipped</div>`
                  : "";
              snippetEl.innerHTML =
                driftWarning +
                `<pre class="fm-code"><code>${esc(d.content)}</code></pre>`;
              snippetEl.dataset.loaded = "1";
            } else {
              snippetEl.innerHTML =
                '<span style="color:var(--danger);font-size:11px">Kan bestand niet laden</span>';
            }
          } catch {
            snippetEl.innerHTML =
              '<span style="color:var(--danger);font-size:11px">Server niet bereikbaar</span>';
          }
        } else {
          snippetEl.style.display = "block";
        }
        rowEl.classList.add("active");
      }

      function closeFeatureModal() {
        const modal = document.getElementById("feature-modal");
        if (modal) modal.classList.remove("active");
      }

      function renderFeatures() {
        let shipped = (data.features || []).filter((f) => f.shipped);

        if (!shipped.length) {
          return `
            <div class="section-header"><h2>Features</h2></div>
            <div class="empty-state">
              <p>Nog geen shipped features.</p>
              <p style="color:var(--text-dim)">Run <code>/dev-refactor</code> om features te promoten naar het dashboard.</p>
            </div>`;
        }

        const rowsHtml = shipped
          .map((f) => {
            const dateStr = f.shippedAt || f.date || "";
            return `
            <div class="feat-row">
              <div class="feat-row-summary" onclick="toggleDashFeature(this,'${esc(f.name)}')">
                <span class="feat-name">${esc(f.name)}</span>
                ${f.description ? `<span class="feat-desc">${esc(f.description)}</span>` : ""}
                <span class="feat-type">${esc(f.type || "FEATURE")}</span>
                ${dateStr ? `<span class="feat-date">${esc(dateStr)}</span>` : ""}
              </div>
              <div class="feat-expand" style="display:none"></div>
            </div>`;
          })
          .join("");

        return `
          <div class="section-header"><h2>Features</h2></div>
          <div class="feat-list">${rowsHtml}</div>`;
      }

      function renderLearnings() {
        const all = (data.learnings || [])
          .slice()
          .sort((a, b) => (a.date < b.date ? 1 : -1));
        const groups = [
          { type: "pattern", label: "Patterns", desc: "Architecturale keuzes" },
          { type: "pitfall", label: "Pitfalls", desc: "Bewezen bugs" },
          {
            type: "observation",
            label: "Observations",
            desc: "Cross-feature inferenties",
          },
        ];

        const learningsSections = groups
          .map((g) => {
            const items = all.filter((l) => l.type === g.type);
            if (!items.length) return "";
            const rows = items
              .map((l) => {
                return `<div class="learnings-row">
                  <span class="learnings-date">${esc(l.date || "")}</span>
                  <span class="learnings-feature" onclick="navigateToFeature('${esc(l.feature || "")}')">${esc(l.feature || "—")}</span>
                  <span class="learnings-summary">${esc(l.summary || "")}</span>
                </div>`;
              })
              .join("");
            return `<div class="learnings-group learnings-group--${g.type}">
              <h3>${g.label} <span class="learnings-group-desc">${g.desc}</span></h3>
              ${rows}
            </div>`;
          })
          .join("");

        // Principles vanuit data.design
        const d = data.design || {};
        const principles = d.principles || [];

        const principlesSection = principles.length
          ? `<div class="learnings-group learnings-group--principles">
              <h3>Principles</h3>
              ${principles
                .map(
                  (p) => `
              <div class="learnings-row" style="display:flex;align-items:baseline;gap:16px">
                <span class="learnings-summary" style="font-weight:500;color:var(--text);white-space:nowrap;flex-shrink:0">${esc(p.name)}</span>
                <span class="learnings-summary" style="flex:1">${esc(p.description || "")}</span>
              </div>`,
                )
                .join("")}
            </div>`
          : "";

        const hasContent = learningsSections || principlesSection;

        return `
          <div class="section-header">
            <h2>Knowledge</h2>
          </div>
          ${
            hasContent
              ? `${learningsSections}${principlesSection}`
              : `<div class="empty-state"><p>Nog geen knowledge vastgelegd.</p><p style="color:var(--text-dim)">Wordt automatisch gevuld door <code>/dev-verify</code> of <code>/game-verify</code></p></div>`
          }
        `;
      }

      function navigateToFeature(name) {
        if (!name) return;
        const project = window.location.pathname.split("/").filter(Boolean)[0];
        if (!project) return;
        window.location.href = `/${project}/feature/${encodeURIComponent(name)}`;
      }

      const renderers = {
        features: renderFeatures,
        concept: renderConcept,
        architecture: renderArchitecture,
        stack: renderStack,
        theme: renderTheme,
        learnings: renderLearnings,
        config: renderConfig,
      };

      function renderSearchResults(q) {
        const results = [];

        const hit = (text) => (text || "").toLowerCase().includes(q);

        (data.features || [])
          .filter((f) => f.shipped)
          .forEach((f) => {
            if (hit(f.name) || hit(f.description))
              results.push({
                section: "Features",
                anchor: "#features",
                type: f.type || "FEATURE",
                name: f.name,
                desc: f.description || "",
              });
          });

        const arch = data.architecture || {};
        (arch.components || []).forEach((c) => {
          if (hit(c.name) || hit(c.description))
            results.push({
              section: "Architecture",
              anchor: "#architecture",
              type: "component",
              name: c.name,
              desc: c.description || "",
            });
        });
        (arch.routes || []).forEach((r) => {
          const label = r.path || r.name || "";
          if (hit(label) || hit(r.description))
            results.push({
              section: "Architecture",
              anchor: "#architecture",
              type: "route",
              name: label,
              desc: r.description || "",
            });
        });
        (arch.endpoints || []).forEach((e) => {
          const label = e.method ? `${e.method} ${e.path}` : e.path || "";
          if (hit(label) || hit(e.description))
            results.push({
              section: "Architecture",
              anchor: "#architecture",
              type: "endpoint",
              name: label,
              desc: e.description || "",
            });
        });
        (arch.entities || []).forEach((e) => {
          if (hit(e.name) || hit(e.description))
            results.push({
              section: "Architecture",
              anchor: "#architecture",
              type: "entity",
              name: e.name,
              desc: e.description || "",
            });
        });

        const stack = data.stack || {};
        ["framework", "language", "styling", "db", "auth", "hosting"].forEach(
          (k) => {
            if (stack[k] && hit(stack[k]))
              results.push({
                section: "Stack",
                anchor: "#stack",
                type: k,
                name: stack[k],
                desc: "",
              });
          },
        );
        (stack.packages || []).forEach((p) => {
          const name = p.name || (typeof p === "string" ? p : "");
          if (hit(name) || hit(p.description))
            results.push({
              section: "Stack",
              anchor: "#stack",
              type: "package",
              name,
              desc: p.description || "",
            });
        });

        (data.learnings || []).forEach((l) => {
          if (hit(l.summary) || hit(l.feature))
            results.push({
              section: "Knowledge",
              anchor: "#learnings",
              type: l.type || "learning",
              name: l.summary || "",
              desc: l.feature || "",
            });
        });

        const design = data.design || {};
        (design.flows || []).forEach((f) => {
          if (hit(f.name) || hit(f.description))
            results.push({
              section: "Knowledge",
              anchor: "#learnings",
              type: "flow",
              name: f.name,
              desc: f.description || "",
            });
        });
        (design.principles || []).forEach((p) => {
          if (hit(p.name) || hit(p.description))
            results.push({
              section: "Knowledge",
              anchor: "#learnings",
              type: "principle",
              name: p.name,
              desc: p.description || "",
            });
        });

        const theme = data.theme || {};
        const themeColors = theme.colors || {};
        ["main", "accent", "semantic"].forEach((group) => {
          (themeColors[group] || []).forEach((c) => {
            if (hit(c.token) || hit(c.value) || hit(c.usage))
              results.push({
                section: "Design System",
                anchor: "#theme",
                type: "color",
                name: c.token,
                desc: c.value + (c.usage ? " — " + c.usage : ""),
              });
          });
        });
        const families = (theme.typography || {}).families || {};
        ["heading", "body", "mono"].forEach((role) => {
          if (families[role] && hit(families[role]))
            results.push({
              section: "Design System",
              anchor: "#theme",
              type: "font",
              name: families[role],
              desc: role,
            });
        });
        ((theme.typography || {}).sizes || []).forEach((s) => {
          if (hit(s.token) || hit(s.size))
            results.push({
              section: "Design System",
              anchor: "#theme",
              type: "type",
              name: s.token,
              desc: s.size,
            });
        });
        [
          { key: "spacing", items: (theme.spacing || {}).scale || [] },
          { key: "breakpoint", items: theme.breakpoints || [] },
          { key: "radius", items: theme.borderRadius || [] },
          { key: "shadow", items: theme.shadows || [] },
        ].forEach(({ key, items }) => {
          items.forEach((item) => {
            if (
              hit(item.token) ||
              hit(item.value) ||
              hit(item.usage) ||
              hit(item.target)
            )
              results.push({
                section: "Design System",
                anchor: "#theme",
                type: key,
                name: item.token,
                desc:
                  item.value +
                  (item.usage || item.target
                    ? " — " + (item.usage || item.target)
                    : ""),
              });
          });
        });

        if (!results.length) {
          return `<div class="sr-empty">Geen resultaten voor <strong>${esc(q)}</strong></div>`;
        }

        const groups = {};
        results.forEach((r) => {
          if (!groups[r.section]) groups[r.section] = [];
          groups[r.section].push(r);
        });

        return `<div class="sr-results">${Object.entries(groups)
          .map(
            ([section, items]) => `
          <div class="sr-section">
            <div class="sr-section-label">${esc(section)}</div>
            ${items
              .map(
                (item) => `
              <a href="${item.anchor}" class="sr-item" onclick="setTimeout(()=>{document.getElementById('dash-search').value='';render();},80)">
                <span class="sr-badge">${esc(item.type)}</span>
                <span class="sr-name">${esc(item.name)}</span>
                ${item.desc ? `<span class="sr-desc">${esc(item.desc)}</span>` : ""}
              </a>`,
              )
              .join("")}
          </div>`,
          )
          .join("")}</div>`;
      }

      function render() {
        const projectName = data.concept.name || data.name || "Dashboard";
        document.title = projectName + " — Dashboard";

        // Layout
        let layoutEl = document.querySelector(".layout");
        if (!layoutEl) {
          layoutEl = document.createElement("div");
          layoutEl.className = "layout";
          document.body.appendChild(layoutEl);
        }

        // Sidebar
        let sidebarEl = layoutEl.querySelector(".sidebar");
        if (!sidebarEl) {
          sidebarEl = document.createElement("nav");
          sidebarEl.className = "sidebar";
          layoutEl.prepend(sidebarEl);
        }

        // Determine which sections to show (skip empty optional ones)
        const d = data.design || {};
        const th = data.theme || {};
        const tc = th.colors && !Array.isArray(th.colors) ? th.colors : {};
        const hasTheme =
          (tc.main && tc.main.length) ||
          (tc.accent && tc.accent.length) ||
          (tc.semantic && tc.semantic.length) ||
          (th.typography &&
            th.typography.sizes &&
            th.typography.sizes.length) ||
          th.cssVars;
        const hasLearnings =
          (data.learnings || []).length > 0 ||
          (d.flows && d.flows.length) ||
          (d.principles && d.principles.length);
        const a = data.architecture || {};
        const hasArchitecture =
          (a.routes && a.routes.length) ||
          (a.components && a.components.length) ||
          (a.endpoints && a.endpoints.length) ||
          (a.entities && a.entities.length) ||
          (a.diagram && a.diagram.trim());
        const hasStack = !!(
          data.stack &&
          (data.stack.framework || data.stack.language)
        );
        const hasConcept = !!(
          data.concept &&
          (data.concept.name || data.concept.content)
        );
        const hasFeatures = (data.features || []).length > 0;
        const hiddenSections = {};
        if (!hasTheme) hiddenSections.theme = true;
        if (!hasLearnings) hiddenSections.learnings = true;
        if (!hasArchitecture) hiddenSections.architecture = true;
        if (!hasStack) hiddenSections.stack = true;
        if (!hasConcept) hiddenSections.concept = true;
        if (!hasFeatures) hiddenSections.features = true;

        const visibleTabs = TABS.filter((t) => !hiddenSections[t.id]);

        // Sidebar: anchor links (no tab switching)
        sidebarEl.innerHTML = visibleTabs
          .map(
            (t) =>
              `<a href="#${t.id}" data-section="${t.id}">${esc(t.label)}</a>`,
          )
          .join("");

        // Content: all sections simultaneously
        let contentEl = layoutEl.querySelector(".content");
        if (!contentEl) {
          contentEl = document.createElement("main");
          contentEl.className = "content";
          layoutEl.appendChild(contentEl);
        }

        // Toolbar — created once at top of content (preserves search focus)
        if (!contentEl.querySelector(".content-toolbar")) {
          const toolbar = document.createElement("div");
          toolbar.className = "content-toolbar";
          toolbar.innerHTML = `<input id="dash-search" class="content-toolbar-search" placeholder="Zoeken..." oninput="render()" />`;
          contentEl.appendChild(toolbar);
        }

        // Sections: replace on each render
        let sectionsEl = contentEl.querySelector(".dash-sections");
        if (!sectionsEl) {
          sectionsEl = document.createElement("div");
          sectionsEl.className = "dash-sections";
          contentEl.appendChild(sectionsEl);
        }
        const q = getDashSearch();
        if (q) {
          sectionsEl.innerHTML = renderSearchResults(q);
        } else {
          sectionsEl.innerHTML = visibleTabs
            .map(
              (t) =>
                `<section id="${t.id}" class="dash-section">${renderers[t.id] ? renderers[t.id]() : ""}</section>`,
            )
            .join("");
        }

        sectionsEl.onclick = (e) => {
          if (e.target.closest("button, a, input, select, textarea")) return;
          const learningsH3 = e.target.closest(".learnings-group > h3");
          if (learningsH3) {
            learningsH3.parentElement.classList.toggle("collapsed");
            return;
          }
          const sgTitle = e.target.closest(".sg-section > .sg-section-title");
          if (sgTitle) {
            sgTitle.parentElement.classList.toggle("collapsed");
            return;
          }
          const sectionHeader = e.target.closest(
            ".dash-section > .section-header",
          );
          if (sectionHeader) {
            sectionHeader.parentElement.classList.toggle("collapsed");
            return;
          }
        };

        // Sidebar active state: pick section closest to top of viewport
        let _dashClickFrozen = false;
        let _dashClickTimer = null;
        function setDashActive(id) {
          sidebarEl.querySelectorAll("a[data-section]").forEach((a) => {
            a.classList.toggle("active", a.dataset.section === id);
          });
        }
        function updateDashSidebarActive() {
          if (_dashClickFrozen) return;
          const sections = Array.from(
            contentEl.querySelectorAll(".dash-section[id]"),
          );
          if (!sections.length) return;
          // Find section whose top is closest to 60px (just below sticky header)
          let best = sections[0];
          let bestDist = Infinity;
          sections.forEach((s) => {
            const top = s.getBoundingClientRect().top;
            const dist = Math.abs(top - 60);
            if (dist < bestDist) {
              bestDist = dist;
              best = s;
            }
          });
          setDashActive(best.id);
        }
        // On click: freeze scroll-based updates for 800ms so click wins
        sidebarEl.querySelectorAll("a[data-section]").forEach((a) => {
          a.addEventListener("click", () => {
            _dashClickFrozen = true;
            setDashActive(a.dataset.section);
            clearTimeout(_dashClickTimer);
            _dashClickTimer = setTimeout(() => {
              _dashClickFrozen = false;
            }, 800);
          });
        });
        window.removeEventListener("scroll", window._dashSidebarScroll);
        window._dashSidebarScroll = updateDashSidebarActive;
        window.addEventListener("scroll", updateDashSidebarActive, {
          passive: true,
        });
        updateDashSidebarActive();
      }

      // ─── Init ───────────────────────────────────────────────
      mermaid.initialize({
        startOnLoad: false,
        theme: "dark",
        themeVariables: {
          darkMode: true,
          background: "#161b22",
          primaryColor: "#58a6ff",
          primaryTextColor: "#c9d1d9",
          primaryBorderColor: "#30363d",
          lineColor: "#586069",
          secondaryColor: "#1c2128",
          tertiaryColor: "#161b22",
          fontFamily:
            '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
        },
      });
      render();
    </script>
    <button
      id="back-to-top"
      onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
      title="Naar boven"
    >
      ↑
    </button>
    <script>
      (function () {
        const btn = document.getElementById("back-to-top");
        window.addEventListener(
          "scroll",
          () => {
            btn.classList.toggle("visible", window.scrollY > 300);
          },
          { passive: true },
        );
      })();
    </script>
  </body>
</html>
