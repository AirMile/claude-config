  <body>
    <script id="dashboard-data" type="application/json">
      {

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <h3 id="modal-title">Bewerken</h3>
        <div id="modal-body"></div>
        <div class="modal-buttons">
          <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
          <button
            class="btn-danger"
            id="modal-delete"
            style="display: none"
            onclick="handleModalDelete()"
          >
            Verwijderen
          </button>
          <button class="btn-save" id="modal-save" onclick="handleModalSave()">
            Opslaan
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Diagram Lightbox -->
    <div class="diagram-lightbox" id="diagram-lightbox">
      <div class="diagram-lightbox-toolbar">
        <span class="diagram-lightbox-hint"
          >Scroll om te zoomen &middot; Sleep om te pannen</span
        >
        <button class="diagram-lightbox-close" onclick="closeDiagramLightbox()">
          &times;
        </button>
      </div>
      <div class="diagram-lightbox-viewport" id="diagram-lightbox-viewport">
        <div
          class="diagram-lightbox-content"
          id="diagram-lightbox-content"
        ></div>
      </div>
    </div>

    <script>
      // ─── Markdown ─────────────────────────────────────────
      function slugify(text) {
        return text
          .toLowerCase()
          .replace(/<[^>]*>/g, "")
          .replace(/[^\w\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-")
          .trim();
      }

      const renderer = new marked.Renderer();
      renderer.heading = function ({ text, depth }) {
        const id = slugify(text);
        return `<h${depth} id="${id}">${text}</h${depth}>`;
      };

      marked.setOptions({ breaks: true, gfm: true, renderer });

      function md(text) {
        if (!text) return "";
        return marked.parse(text);
      }

      // ─── State ──────────────────────────────────────────────
      const raw = document.getElementById("dashboard-data").textContent;
      let data = JSON.parse(raw);
      let activeTab = localStorage.getItem("dashboard-tab") || "concept";
      // Migrate old tab names
      if (activeTab === "diagram") activeTab = "architecture";
      if (activeTab === "features") activeTab = "concept";
      if (activeTab === "config") activeTab = "concept";
      let modalContext = null;

      const TABS = [
        { id: "concept", label: "Concept" },
        { id: "architecture", label: "Components" },
        { id: "design", label: "Design" },
        { id: "theme", label: "Theme" },
        { id: "stack", label: "Stack" },
        { id: "thinking", label: "Thinking" },
        { id: "config", label: "Config" },
      ];

      const EMPTY = {
        concept: {
          name: "",
          content: "",
          thinking: [],
        },
        architecture: {
          diagram: "",
          description: "",
        },
        design: {
          pages: [],
          flows: [],
          principles: [],
        },
        theme: {
          colors: { main: [], accent: [], semantic: [] },
          typography: {
            families: { heading: "", body: "", mono: "" },
            sizes: [],
          },
          spacing: { base: "", scale: [] },
          breakpoints: [],
          borderRadius: [],
          shadows: [],
          modes: {},
          cssVars: "",
        },
        stack: {
          framework: "",
          language: "",
          styling: "",
          db: "",
          auth: "",
          hosting: "",
          packages: [],
        },
        data: { entities: [] },
        endpoints: [],
        thinking: [],
      };

      // Ensure all sections exist
      for (const key of Object.keys(EMPTY)) {
        if (!data[key]) data[key] = JSON.parse(JSON.stringify(EMPTY[key]));
      }

      // ─── Helpers ────────────────────────────────────────────
      function esc(str) {
        const d = document.createElement("div");
        d.textContent = str || "";
        return d.innerHTML;
      }

      function toast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("visible");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("visible"), 2000);
      }

      function openInVSCode(url, el) {
        const orig = el.style.color;
        el.style.color = "var(--text-dim)";
        fetch(url, { method: "POST" })
          .then((r) => r.json())
          .then((d) => {
            if (d.ok) {
              el.style.color = "var(--done)";
              setTimeout(() => (el.style.color = orig), 1000);
            } else {
              el.style.color = "var(--danger)";
              toast("Fout: " + (d.error || "onbekend"));
              setTimeout(() => (el.style.color = orig), 2000);
            }
          })
          .catch(() => {
            el.style.color = "var(--danger)";
            toast("Kon VS Code niet bereiken");
            setTimeout(() => (el.style.color = orig), 2000);
          });
      }

      const SAVE_URL = (() => {
        const p = location.pathname.replace(/\/+$/, "");
        return p ? p + "/save" : "/save";
      })();

      let saveTimer = null;
      function syncJSON() {
        const el = document.getElementById("dashboard-data");
        el.textContent = "\n" + JSON.stringify(data, null, 2) + "\n";
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          try {
            const res = await fetch(SAVE_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });
            if (!res.ok) throw new Error("save failed");
            toast("Opgeslagen");
          } catch {
            toast("Server niet bereikbaar");
          }
        }, 300);
      }

      // ─── Modal ──────────────────────────────────────────────
      // Anchor link navigation within modals (e.g. research TOC)
      document.getElementById("modal-body").addEventListener("click", (e) => {
        const a = e.target.closest("a[href^='#']");
        if (!a) return;
        e.preventDefault();
        const id = decodeURIComponent(a.getAttribute("href").slice(1));
        const target = document.getElementById(id);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      });

      function openModal(title, bodyHtml, ctx) {
        modalContext = ctx;
        document.getElementById("modal-title").textContent = title;
        document.getElementById("modal-body").innerHTML = bodyHtml;
        document.getElementById("modal-delete").style.display =
          ctx && ctx.deletable ? "" : "none";
        const isReadOnly = ctx && ctx.readOnly;
        document.getElementById("modal-save").style.display = isReadOnly
          ? "none"
          : "";
        document.querySelector("#modal .btn-cancel").textContent = isReadOnly
          ? "Sluiten"
          : "Annuleren";
        document.getElementById("modal").classList.add("active");
        if (isReadOnly) {
          document.querySelector("#modal .modal").style.maxWidth = ctx.wide
            ? "800px"
            : "";
        } else {
          document.querySelector("#modal .modal").style.maxWidth = "";
        }
        const first = document.querySelector(
          "#modal-body input, #modal-body textarea, #modal-body select",
        );
        if (first) first.focus();
      }

      function closeModal() {
        document.getElementById("modal").classList.remove("active");
        modalContext = null;
      }

      function handleModalSave() {
        if (modalContext && modalContext.onSave) {
          modalContext.onSave();
        }
        closeModal();
        syncJSON();
        render();
      }

      function handleModalDelete() {
        if (modalContext && modalContext.onDelete) {
          modalContext.onDelete();
        }
        closeModal();
        syncJSON();
        render();
      }

      document.getElementById("modal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modal")) closeModal();
      });

      document.getElementById("modal").addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
        if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
          e.preventDefault();
          handleModalSave();
        }
      });

      // ─── Diagram Lightbox (pan & zoom) ─────────────────────
      (function () {
        const lb = document.getElementById("diagram-lightbox");
        const vp = document.getElementById("diagram-lightbox-viewport");
        const ct = document.getElementById("diagram-lightbox-content");
        let scale = 1,
          tx = 0,
          ty = 0,
          dragging = false,
          startX,
          startY;

        function apply() {
          ct.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
        }

        window.openDiagramLightbox = function () {
          const src = document.querySelector("#arch-diagram svg");
          if (!src) return;
          ct.innerHTML = "";
          const clone = src.cloneNode(true);
          const origId = src.getAttribute("id") || "arch-mermaid";
          const newId = origId + "-lb";
          clone.setAttribute("id", newId);
          clone.querySelectorAll("style").forEach((s) => {
            s.textContent = s.textContent.replaceAll("#" + origId, "#" + newId);
          });
          const vb = clone.getAttribute("viewBox");
          if (vb) {
            const [, , w, h] = vb.split(/\s+/).map(Number);
            clone.setAttribute("width", w);
            clone.setAttribute("height", h);
          }
          clone.style.maxWidth = "none";
          ct.appendChild(clone);
          lb.classList.add("active");
          document.body.style.overflow = "hidden";
          // fit diagram to viewport with padding
          const vpRect = vp.getBoundingClientRect();
          const pad = 40;
          const svgW =
            clone.getBoundingClientRect().width ||
            parseFloat(clone.getAttribute("width"));
          const svgH =
            clone.getBoundingClientRect().height ||
            parseFloat(clone.getAttribute("height"));
          scale = Math.min(
            (vpRect.width - pad * 2) / svgW,
            (vpRect.height - pad * 2) / svgH,
            1,
          );
          tx = (vpRect.width - svgW * scale) / 2;
          ty = (vpRect.height - svgH * scale) / 2;
          apply();
        };

        window.closeDiagramLightbox = function () {
          lb.classList.remove("active");
          document.body.style.overflow = "";
        };

        lb.addEventListener("click", (e) => {
          if (e.target === lb || e.target === vp) closeDiagramLightbox();
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && lb.classList.contains("active"))
            closeDiagramLightbox();
        });

        vp.addEventListener(
          "wheel",
          (e) => {
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            const rect = vp.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            tx = mx - factor * (mx - tx);
            ty = my - factor * (my - ty);
            scale *= factor;
            apply();
          },
          { passive: false },
        );

        vp.addEventListener("mousedown", (e) => {
          if (e.button !== 0) return;
          dragging = true;
          startX = e.clientX - tx;
          startY = e.clientY - ty;
          vp.style.cursor = "grabbing";
        });

        window.addEventListener("mousemove", (e) => {
          if (!dragging) return;
          tx = e.clientX - startX;
          ty = e.clientY - startY;
          apply();
        });

        window.addEventListener("mouseup", () => {
          dragging = false;
          vp.style.cursor = "grab";
        });
      })();

      // ─── Section Renderers ──────────────────────────────────

      function showConceptThinking(idx) {
        const e = ((data.concept && data.concept.thinking) || [])[idx];
        if (!e) return;
        let meta = "";
        if (e.type === "brainstorm" || e.type === "decision") {
          if (e.chosen) meta += `<strong>Gekozen:</strong> ${esc(e.chosen)}`;
          const options = e.variants || e.options || [];
          if (options.length)
            meta += `${e.chosen ? " · " : ""}<strong>Opties:</strong> ${options.map((o) => esc(o)).join(", ")}`;
        }
        if (e.type === "decision" && e.rationale) {
          meta += `<br><strong>Rationale:</strong> ${esc(e.rationale)}`;
        }
        openModal(
          e.title || "Untitled",
          `
          ${meta ? `<div class="thinking-meta" style="margin-bottom:12px">${meta}</div>` : ""}
          <div class="thinking-content">${md(e.content || "")}</div>
          ${e.source ? `<div class="thinking-source" style="margin-top:12px">${esc(e.source)}</div>` : ""}
        `,
          { readOnly: true, wide: true },
        );
      }

      function renderConceptThinking() {
        const entries = (data.concept && data.concept.thinking) || [];
        if (entries.length === 0) return "";

        const cards = [...entries]
          .map((e, i) => ({ ...e, _idx: i }))
          .reverse()
          .map((e) => {
            let meta = "";
            if (e.type === "brainstorm" || e.type === "decision") {
              if (e.chosen) {
                meta += `<strong>Gekozen:</strong> ${esc(e.chosen)}`;
              }
              const options = e.variants || e.options || [];
              if (options.length) {
                meta += `${e.chosen ? " · " : ""}<strong>Opties:</strong> ${options.map((o) => esc(o)).join(", ")}`;
              }
            }
            if (e.type === "decision" && e.rationale) {
              meta += `<br><strong>Rationale:</strong> ${esc(e.rationale)}`;
            }
            const content = e.content || "";
            const truncated =
              content.length > 300 ? content.slice(0, 300) + "..." : content;
            const needsExpand = content.length > 300;

            return `
          <div class="thinking-entry thinking-entry-compact" data-type="${esc(e.type || "idea")}" style="cursor:pointer" onclick="showConceptThinking(${e._idx})">
            <div class="thinking-header">
              <span class="thinking-type-badge" data-type="${esc(e.type || "idea")}">${esc(e.type || "idea")}</span>
              <span class="thinking-title">${esc(e.title || "Untitled")}</span>
              <span class="thinking-date">${esc(e.date || "")}</span>
            </div>
            <div class="thinking-source">${esc(e.source || "")}</div>
          </div>`;
          })
          .join("");

        return `
          <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
            <h3 style="font-size:14px;color:var(--text-muted);margin-bottom:12px">Concept Progressie</h3>
            ${cards}
          </div>`;
      }

      function renderConcept() {
        const c = data.concept;
        if (!c.name && !c.content) {
          return `
            <div class="section-header">
              <h2>Concept</h2>
              <button class="edit-btn" onclick="editConcept()">+ Toevoegen</button>
            </div>
            <div class="empty-state"><p>Nog geen concept gedefinieerd.</p>
            <p style="color:var(--text-dim)">Wordt automatisch gevuld door <code>/dev-plan</code> of <code>/game-plan</code></p></div>`;
        }
        return `
          <div class="section-header">
            <h2>Concept</h2>
            <button class="edit-btn icon-btn" onclick="editConcept()" title="Bewerken"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
          </div>
          <div class="concept-content">${md(c.content)}</div>
          ${renderConceptThinking()}`;
      }

      let _diagramRenderId = 0;
      let _diagramShowAll = localStorage.getItem("diagram-scope") !== "built";

      function filterDiagram(src, showAll) {
        if (showAll) return src;
        const lines = src.split("\n");
        const planned = new Set();
        for (const l of lines) {
          const m = l.match(/^\s*(\w+)[\[({].*:::planned/);
          if (m) planned.add(m[1]);
        }
        if (!planned.size) return src;
        // pass 1: remove planned nodes and their connections
        const filtered = lines.filter((l) => {
          if (/^\s*(classDef|graph|flowchart)\s/.test(l)) return true;
          if (/^\s*subgraph\s/.test(l) || /^\s*end\s*$/.test(l)) return true;
          for (const id of planned) {
            if (new RegExp("^\\s*" + id + "[\\[({]").test(l)) return false;
          }
          if (/-->|---|\.-|==>/.test(l)) {
            for (const id of planned) {
              if (new RegExp("(^|\\s)" + id + "(\\s|$|[\\[(-])").test(l))
                return false;
            }
          }
          return true;
        });
        // pass 2: remove empty subgraphs
        const result = [];
        let i = 0;
        while (i < filtered.length) {
          if (/^\s*subgraph\s/.test(filtered[i])) {
            let j = i + 1;
            while (j < filtered.length && !/^\s*end\s*$/.test(filtered[j])) j++;
            let hasContent = false;
            for (let k = i + 1; k < j; k++) {
              if (filtered[k].trim()) {
                hasContent = true;
                break;
              }
            }
            if (hasContent) {
              for (let k = i; k <= j; k++) result.push(filtered[k]);
            }
            i = j + 1;
          } else {
            result.push(filtered[i]);
            i++;
          }
        }
        return result.join("\n");
      }

      // ─── Code Cards ────────────────────────────────────

      function buildCodeCards() {
        const a = data.architecture || {};
        const components = a.components;
        if (!components || !components.length) return null;

        const reverseMap = {};
        components.forEach((c) => {
          (c.connects_to || []).forEach((target) => {
            if (!reverseMap[target]) reverseMap[target] = [];
            reverseMap[target].push(c.name);
          });
        });

        return components.map((c) => ({
          name: c.name,
          description: c.description || "",
          feature: c.feature || "",
          src: c.src || [],
          test: c.test || [],
          status: c.status || "done",
          group: c.layer || "Overig",
          endpoints: (c.endpoints || []).map((p) => {
            const parts = p.trim().split(/\s+/);
            const hasMethod =
              /^(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS)$/i.test(parts[0]);
            return {
              method: hasMethod ? parts[0].toUpperCase() : "GET",
              path: hasMethod ? parts.slice(1).join(" ") : p,
            };
          }),
          entities: (c.entities || []).map((e) => ({ name: e })),
          connections: {
            to: c.connects_to || [],
            from: reverseMap[c.name] || [],
          },
        }));
      }

      function toggleCard(card) {
        const wasExpanded = card.classList.contains("expanded");

        // Single pass: collapse others + clear highlights
        document.querySelectorAll(".code-card").forEach((c) => {
          if (c !== card) c.classList.remove("expanded");
          c.classList.remove(
            "code-card-dimmed",
            "code-card-connected",
            "code-card-connected--to",
            "code-card-connected--from",
          );
        });

        card.classList.toggle("expanded");

        if (!wasExpanded) {
          const connTo = new Set(
            (card.dataset.connTo || "").split(",").filter(Boolean),
          );
          const connFrom = new Set(
            (card.dataset.connFrom || "").split(",").filter(Boolean),
          );

          if (connTo.size || connFrom.size) {
            document.querySelectorAll(".code-card").forEach((c) => {
              if (c === card) return;
              const name = c.dataset.component;
              if (connTo.has(name)) {
                c.classList.add(
                  "code-card-connected",
                  "code-card-connected--to",
                );
              } else if (connFrom.has(name)) {
                c.classList.add(
                  "code-card-connected",
                  "code-card-connected--from",
                );
              } else {
                c.classList.add("code-card-dimmed");
              }
            });
          }
        }
      }

      let _archDiagramRendered = false;
      function toggleArchDiagram() {
        const el = document.getElementById("arch-diagram");
        const btn = document.querySelector(".arch-diagram-toggle");
        if (!el) return;
        const hidden = el.classList.toggle("architecture-diagram--hidden");
        if (btn) btn.classList.toggle("active", !hidden);
        if (!hidden && !_archDiagramRendered) {
          const a = data.architecture || {};
          if (a.diagram) {
            renderMermaidDiagram(a.diagram);
            _archDiagramRendered = true;
          }
        }
      }

      function highlightCard(chip) {
        const target = chip.dataset.target;
        if (!target) return;
        const card = document.querySelector(
          `.code-card[data-component="${target}"]`,
        );
        if (!card) {
          chip.classList.add("code-card-conn--dead");
          chip.title = "Geen card gevonden voor dit component";
          return;
        }
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        if (!card.classList.contains("expanded")) {
          toggleCard(card);
        }
      }

      function openFileInVSCode(filePath, el) {
        const url =
          location.pathname.replace(/\/$/, "") +
          "/open/" +
          encodeURIComponent(filePath).replace(/%2F/g, "/");
        openInVSCode(url, el);
      }

      function applyCodeCardFilter(showAll) {
        document.querySelectorAll(".code-card").forEach((card) => {
          card.classList.toggle(
            "code-card-hidden",
            !showAll && card.dataset.status === "planned",
          );
        });
        document.querySelectorAll(".code-cards-group").forEach((group) => {
          const visible = group.querySelectorAll(
            ".code-card:not(.code-card-hidden)",
          );
          group.style.display = visible.length ? "" : "none";
        });
      }

      const MAX_CONN_PER_DIR = 4;

      function renderConnChip(name, dir) {
        return `<span class="code-card-conn code-card-conn--${dir}" data-target="${esc(name.toLowerCase())}" onclick="highlightCard(this)">${esc(name)}</span>`;
      }

      function renderConnGroup(items, dir, label) {
        if (!items.length) return "";
        const visible = items.slice(0, MAX_CONN_PER_DIR);
        const hidden = items.length - visible.length;
        return `<div class="code-card-conn-group">
          <span class="code-card-conn-label">${label}</span>
          <div class="code-card-conn-chips">
            ${visible.map((n) => renderConnChip(n, dir)).join("")}
            ${
              hidden > 0
                ? `<span class="code-card-conn code-card-conn--more" onclick="this.nextElementSibling.style.display='contents';this.remove()">+${hidden}</span><span style="display:none">${items
                    .slice(MAX_CONN_PER_DIR)
                    .map((n) => renderConnChip(n, dir))
                    .join("")}</span>`
                : ""
            }
          </div>
        </div>`;
      }

      function renderFileChip(path, isTest) {
        return `<span class="code-card-file${isTest ? " code-card-file--test" : ""}" data-path="${esc(path)}" onclick="openFileInVSCode(this.dataset.path, this)">${esc(path.split("/").pop())}</span>`;
      }

      function renderCodeCardsGrid(cards) {
        const grouped = {};
        cards.forEach((c) => {
          if (!grouped[c.group]) grouped[c.group] = [];
          grouped[c.group].push(c);
        });

        const layers = (data.architecture || {}).layers || [];
        const layerOrder = {};
        layers.forEach((l) => (layerOrder[l.name] = l.order || 99));

        const sortedGroups = Object.keys(grouped).sort((a, b) => {
          if (a === "Overig") return 1;
          if (b === "Overig") return -1;
          const oa = layerOrder[a];
          const ob = layerOrder[b];
          if (oa !== undefined && ob !== undefined) return oa - ob;
          if (oa !== undefined) return -1;
          if (ob !== undefined) return 1;
          return a.localeCompare(b);
        });

        return `<div class="code-cards" id="code-cards">${sortedGroups
          .map(
            (groupName) => `
          <div class="code-cards-group">
            <h3 class="code-cards-group-title">${esc(groupName)}</h3>
            <div class="code-cards-grid">
              ${grouped[groupName].map((c) => renderCodeCard(c)).join("")}
            </div>
          </div>`,
          )
          .join("")}</div>`;
      }

      function renderCodeCard(c) {
        const counts = [];
        if (c.src.length)
          counts.push(
            `<span title="${c.src.length} bronbestand${c.src.length > 1 ? "en" : ""}">${c.src.length} src</span>`,
          );
        if (c.test.length)
          counts.push(
            `<span title="${c.test.length} test${c.test.length > 1 ? "s" : ""}">${c.test.length} tst</span>`,
          );
        if (c.endpoints.length)
          counts.push(
            `<span title="${c.endpoints.length} endpoint${c.endpoints.length > 1 ? "s" : ""}">${c.endpoints.length} ep</span>`,
          );

        const conn = c.connections || { to: [], from: [] };
        const hasConn = conn.to.length || conn.from.length;

        const hasDetail =
          c.src.length ||
          c.test.length ||
          c.endpoints.length ||
          c.entities.length ||
          hasConn;

        const connectionsHtml = hasConn
          ? `<div class="code-card-section"><h4>Verbindingen</h4><div class="code-card-connections">
              ${renderConnGroup(conn.from, "from", "Ontvangt van")}
              ${renderConnGroup(conn.to, "to", "Stuurt naar")}
            </div></div>`
          : "";

        const filesHtml =
          c.src.length || c.test.length
            ? `<div class="code-card-section"><h4>Bestanden</h4><div class="code-card-files">
              ${c.src.map((f) => renderFileChip(f, false)).join("")}
              ${c.test.map((f) => renderFileChip(f, true)).join("")}
            </div></div>`
            : "";

        const endpointsHtml = c.endpoints.length
          ? `<div class="code-card-section"><h4>Endpoints</h4><div class="code-card-endpoints">
              ${c.endpoints.map((ep) => `<div class="code-card-endpoint"><span class="badge badge-${(ep.method || "get").toLowerCase()}">${esc(ep.method || "GET")}</span> ${esc(ep.path)}</div>`).join("")}
            </div></div>`
          : "";

        const entitiesHtml = c.entities.length
          ? `<div class="code-card-section"><h4>Entiteiten</h4><div class="code-card-entities">
              ${c.entities.map((e) => `<span class="code-card-entity">${esc(e.name)}</span>`).join("")}
            </div></div>`
          : "";

        const connToLower = conn.to.map((n) => n.toLowerCase()).join(",");
        const connFromLower = conn.from.map((n) => n.toLowerCase()).join(",");

        return `
          <div class="code-card" data-status="${esc(c.status)}" data-component="${esc(c.name.toLowerCase())}" data-conn-to="${esc(connToLower)}" data-conn-from="${esc(connFromLower)}">
            <div class="code-card-header" onclick="toggleCard(this.closest('.code-card'))">
              <span class="code-card-status" data-status="${esc(c.status)}"></span>
              <span class="code-card-name">${esc(c.name)}</span>
              ${c.feature ? `<span class="code-card-feature">${esc(c.feature)}</span>` : ""}
              <span class="code-card-counts">${counts.join("")}</span>
              ${hasDetail ? `<span class="code-card-chevron">&#x203A;</span>` : ""}
            </div>
            ${c.description ? `<div class="code-card-desc">${esc(c.description)}</div>` : ""}
            ${hasDetail ? `<div class="code-card-detail">${connectionsHtml}${filesHtml}${endpointsHtml}${entitiesHtml}</div>` : ""}
          </div>`;
      }

      function renderMermaidDiagram(diagramSrc) {
        const el = document.getElementById("arch-diagram");
        if (!el || !diagramSrc) return;
        const filtered = filterDiagram(diagramSrc, _diagramShowAll);
        el.innerHTML = "";
        const id = "arch-mermaid-" + ++_diagramRenderId;
        mermaid
          .render(id, filtered)
          .then(({ svg }) => {
            el.innerHTML = svg;
            el.style.cursor = "pointer";
            el.title = "Klik om fullscreen te openen";
            el.onclick = () => openDiagramLightbox();
          })
          .catch((err) => {
            el.innerHTML = `<div class="architecture-error">Diagram fout: ${esc(err.message || String(err))}</div>`;
          });
      }

      function toggleDiagramScope(showAll) {
        _diagramShowAll = showAll;
        localStorage.setItem("diagram-scope", showAll ? "all" : "built");
        document
          .querySelectorAll(".arch-toggle button")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector(
            `.arch-toggle button[data-scope="${showAll ? "all" : "built"}"]`,
          )
          ?.classList.add("active");
        const a = data.architecture || {};
        if (a.diagram) renderMermaidDiagram(a.diagram);
        applyCodeCardFilter(showAll);
      }

      function renderArchitecture() {
        const a = data.architecture || {};
        const hasDiagram = a.diagram && a.diagram.trim();
        const cards = buildCodeCards();
        const hasCards = !!cards;
        const hasPlanned =
          hasCards && cards.some((c) => c.status === "planned");

        if (!hasCards && !hasDiagram) {
          return `
            <div class="section-header"><h2>Components</h2></div>
            <div class="empty-state"><p>Nog geen componenten gedefinieerd.</p>
            <p style="color:var(--text-dim)">Wordt gevuld door <code>/dev-define</code></p></div>`;
        }

        // Toolbar: filter toggle + optional diagram toggle
        const filterToggle = hasPlanned
          ? `<div class="arch-toggle">
              <button data-scope="all" class="${_diagramShowAll ? "active" : ""}" onclick="toggleDiagramScope(true)">Alles</button>
              <button data-scope="built" class="${!_diagramShowAll ? "active" : ""}" onclick="toggleDiagramScope(false)">Gebouwd</button>
            </div>`
          : "";

        const diagramToggle =
          hasDiagram && hasCards
            ? `<button class="arch-diagram-toggle" onclick="toggleArchDiagram()">Diagram</button>`
            : "";

        const splitClass =
          filterToggle && diagramToggle ? " arch-toolbar--split" : "";
        const toolbarHtml =
          filterToggle || diagramToggle
            ? `<div class="arch-toolbar${splitClass}">${filterToggle}${diagramToggle}</div>`
            : "";

        // Diagram: hidden by default when cards exist
        const diagramHidden = hasCards;
        const diagramHtml = hasDiagram
          ? `<div class="architecture-diagram${diagramHidden ? " architecture-diagram--hidden" : ""}" id="arch-diagram"></div>`
          : "";

        const dataFlowHtml =
          a.dataFlow && hasCards
            ? `<div class="code-cards-dataflow">${esc(a.dataFlow)}</div>`
            : "";

        let descHtml = "";

        if (hasCards) {
          descHtml = renderCodeCardsGrid(cards);
          setTimeout(() => applyCodeCardFilter(_diagramShowAll), 0);
        } else if (hasDiagram) {
          setTimeout(() => renderMermaidDiagram(a.diagram), 0);
        }

        return `
          <div class="section-header">
            <h2>Components</h2>
            <button class="edit-btn icon-btn" onclick="editArchitecture()" title="Bewerken"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
          </div>
          ${toolbarHtml}
          ${dataFlowHtml}
          ${diagramHtml}
          ${descHtml}`;
      }

      function editArchitecture() {
        const a = data.architecture || {};
        const compJson = a.components
          ? JSON.stringify(a.components, null, 2)
          : "";
        const layersJson = a.layers ? JSON.stringify(a.layers, null, 2) : "";
        openModal(
          "Components bewerken",
          `
          <label>Data Flow</label>
          <input id="f-arch-dataflow" type="text" value="${esc(a.dataFlow || "")}" placeholder="Request → API → Service → Database" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-size:13px" />
          <label>Layers (JSON)</label>
          <textarea id="f-arch-layers" rows="4" style="font-family:var(--font-mono,'JetBrains Mono','Fira Code',monospace);font-size:12px;line-height:1.5" placeholder='[{"name":"API Laag","order":1}]'>${esc(layersJson)}</textarea>
          <label>Components (JSON)</label>
          <textarea id="f-arch-components" rows="16" style="font-family:var(--font-mono,'JetBrains Mono','Fira Code',monospace);font-size:12px;line-height:1.5" placeholder='[{"name":"...","layer":"...","status":"done","connects_to":[]}]'>${esc(compJson)}</textarea>
          <label>Mermaid Diagram (optioneel)</label>
          <textarea id="f-arch-diagram" rows="6" style="font-family:var(--font-mono,'JetBrains Mono','Fira Code',monospace);font-size:12px;line-height:1.5">${esc(a.diagram || "")}</textarea>
        `,
          {
            wide: true,
            onSave() {
              data.architecture = data.architecture || {};
              data.architecture.dataFlow = document
                .getElementById("f-arch-dataflow")
                .value.trim();
              const lv = document.getElementById("f-arch-layers").value.trim();
              if (lv) {
                try {
                  data.architecture.layers = JSON.parse(lv);
                } catch (e) {
                  /* keep existing */
                }
              }
              const cv = document
                .getElementById("f-arch-components")
                .value.trim();
              if (cv) {
                try {
                  data.architecture.components = JSON.parse(cv);
                } catch (e) {
                  /* keep existing */
                }
              }
              data.architecture.diagram =
                document.getElementById("f-arch-diagram").value.trim() || "";
            },
          },
        );
      }

      function renderDesignContent() {
        const d = data.design || {};
        const pages = d.pages || [];
        const flows = d.flows || [];
        const principles = d.principles || [];
        const hasData = pages.length || flows.length || principles.length;

        if (!hasData) {
          return `
            <div class="section-header"><h2>Design</h2></div>
            <div class="empty-state"><p>Nog geen design spec gedefinieerd.</p>
            <p style="color:var(--text-dim)">Wordt gevuld door <code>/frontend-plan</code></p></div>`;
        }

        const statusOrder = ["IDEA", "DEF", "BLT", "DONE"];

        const pagesHtml = pages.length
          ? `<h3 style="margin:24px 0 12px;font-size:14px;color:var(--text-dim)">Pagina's (${pages.length})</h3>
          ${pages
            .map(
              (p) => `
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                <span class="feature-badge" data-status="${esc(p.status || "DEF")}">${esc(p.status || "DEF")}</span>
                <span style="font-weight:600;font-size:14px">${esc(p.name)}</span>
              </div>
              <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">${esc(p.purpose || "")}</div>
              ${
                p.sections && p.sections.length
                  ? `<div style="display:flex;flex-wrap:wrap;gap:4px">${p.sections.map((s) => `<span style="font-size:11px;padding:2px 8px;border-radius:3px;background:var(--surface-hover);color:var(--text-dim)">${esc(s)}</span>`).join("")}</div>`
                  : ""
              }
              ${
                p.flows && p.flows.length
                  ? `<div style="margin-top:6px;font-size:11px;color:var(--text-dim)">Flows: ${p.flows.map((f) => esc(f)).join(", ")}</div>`
                  : ""
              }
              ${p.notes ? `<div style="margin-top:6px;font-size:11px;color:var(--text-dim)">${esc(p.notes)}</div>` : ""}
            </div>`,
            )
            .join("")}`
          : "";

        const flowsHtml = flows.length
          ? `<h3 style="margin:24px 0 12px;font-size:14px;color:var(--text-dim)">User Flows (${flows.length})</h3>
          ${flows

            <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px">

              </div>
              ${f.notes ? `<div style="margin-top:6px;font-size:11px;color:var(--text-dim)">${esc(f.notes)}</div>` : ""}
            </div>`,
            )
            .join("")}`
          : "";

        const principlesHtml = principles.length
          ? `<h3 style="margin:24px 0 12px;font-size:14px;color:var(--text-dim)">Design Principes (${principles.length})</h3>
          <table class="data-table">
            <thead><tr><th>Principe</th><th>Beschrijving</th></tr></thead>
            <tbody>${principles
              .map(
                (p) => `
              <tr>
                <td style="font-weight:500;color:var(--text);white-space:nowrap">${esc(p.name)}</td>
                <td>${esc(p.description)}</td>
              </tr>`,
              )
              .join("")}</tbody>
          </table>`
          : "";

        return `
          <div class="section-header"><h2>Design</h2></div>
          ${pagesHtml}
          ${flowsHtml}
          ${principlesHtml}`;
      }

      function renderTheme() {
        const t = data.theme;
        const colors = t.colors || {};
        const typo = t.typography || {};
        const families = typo.families || {};
        const hasColors = Object.values(colors).some(
          (arr) => arr && arr.length,
        );
        const hasData = hasColors || families.heading || families.body;
        if (!hasData) {
          return `
            <div class="section-header"><h2>Theme</h2></div>
            <div class="empty-state"><p>Nog geen theme gedefinieerd.</p>
            <p style="color:var(--text-dim)">Wordt automatisch gevuld door <code>/frontend-theme</code></p></div>`;
        }

        // ── Colors ──
        function renderPalette(label, items) {
          if (!items || !items.length) return "";
          return `
            <div class="sg-section">
              <div class="sg-section-title">${esc(label)}</div>
              <div class="sg-palette">${items
                .map(
                  (c) => `
                <div class="sg-color">
                  <div class="sg-color-swatch" style="background:${esc(c.value)}"></div>
                  <div class="sg-color-info">
                    <div class="sg-color-token">${esc(c.token)}</div>
                    <div class="sg-color-value">${esc(c.value)}</div>
                    ${c.usage ? `<div class="sg-color-usage">${esc(c.usage)}</div>` : ""}
                  </div>
                </div>`,
                )
                .join("")}</div>
            </div>`;
        }
        const colorsHtml =
          renderPalette("Main Colors", colors.main) +
          renderPalette("Accent Colors", colors.accent) +
          renderPalette("Semantic Colors", colors.semantic);

        // ── Typography ──
        const specimenEntries = [
          { label: "Heading", family: families.heading },
          { label: "Body", family: families.body },
          { label: "Mono", family: families.mono },
        ].filter((e) => e.family);

        const specimensHtml = specimenEntries.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Typography</div>
            <div class="sg-font-specimens">${specimenEntries
              .map(
                (e) => `
              <div class="sg-font-card">
                <div class="sg-font-specimen" style="font-family:${esc(e.family)}">Aa</div>
                <div class="sg-font-name">${esc(e.label)}</div>
                <div class="sg-font-family">${esc(e.family)}</div>
              </div>`,
              )
              .join("")}</div>
          </div>`
          : "";

        // ── Type Scale ──
        const sizes = typo.sizes || [];
        const typeScaleHtml = sizes.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Type Scale</div>
            <div class="sg-type-scale">${sizes
              .map(
                (s) => `
              <div class="sg-type-row">
                <div class="sg-type-label">${esc(s.token)}<br>${esc(s.size)}</div>
                <div class="sg-type-preview" style="font-size:${esc(s.size)};line-height:${esc(s.lineHeight)};font-family:${esc(families.body || "inherit")}">The quick brown fox jumps</div>
              </div>`,
              )
              .join("")}</div>
          </div>`
          : "";

        // ── Spacing ──
        const sp = t.spacing || {};
        const spScale = sp.scale || [];
        const spacingHtml = spScale.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Spacing${sp.base ? ` — base: ${esc(sp.base)}` : ""}</div>
            <div class="sg-spacing-scale">${spScale
              .map(
                (s) => `
              <div class="sg-spacing-row">
                <div class="sg-spacing-label">${esc(s.token)}</div>
                <div class="sg-spacing-bar" style="width:${esc(s.value)}"></div>
                <div class="sg-spacing-value">${esc(s.value)}</div>
              </div>`,
              )
              .join("")}</div>
          </div>`
          : "";

        // ── Breakpoints ──
        const bps = t.breakpoints || [];
        const bpHtml = bps.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Breakpoints</div>
            <div class="sg-spacing-scale">${bps
              .map(
                (b) => `
              <div class="sg-spacing-row">
                <div class="sg-spacing-label">${esc(b.token)}</div>
                <div class="sg-spacing-bar" style="width:min(${esc(b.value)}, 100%);opacity:0.4"></div>
                <div class="sg-spacing-value">${esc(b.value)}${b.target ? ` — ${esc(b.target)}` : ""}</div>
              </div>`,
              )
              .join("")}</div>
          </div>`
          : "";

        // ── Border Radius ──
        const radii = t.borderRadius || [];
        const radiusHtml = radii.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Border Radius</div>
            <div class="sg-radius-grid">${radii
              .map(
                (r) => `
              <div class="sg-radius-item">
                <div class="sg-radius-box" style="border-radius:${esc(r.value)}"></div>
                <div class="sg-radius-label">${esc(r.token)}<br>${esc(r.value)}</div>
              </div>`,
              )
              .join("")}</div>
          </div>`
          : "";

        // ── Shadows ──
        const shdws = t.shadows || [];
        const shadowsHtml = shdws.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Shadows</div>
            <div class="sg-shadow-grid">${shdws
              .map(
                (s) => `
              <div class="sg-shadow-item">
                <div class="sg-shadow-box" style="box-shadow:${esc(s.value)}"></div>
                <div class="sg-shadow-label">${esc(s.token)}</div>
              </div>`,
              )
              .join("")}</div>
          </div>`
          : "";

        // ── Modes ──
        const modes = t.modes || {};
        const modeKeys = Object.keys(modes);
        const modesHtml = modeKeys.length
          ? `
          <div class="sg-section">
            <div class="sg-section-title">Theme Modes</div>
            ${modeKeys
              .map(
                (k) => `
              <div style="margin-bottom:12px">
                <span class="tag" style="margin-bottom:6px;display:inline-block">${esc(k)}</span>
                <div class="code-block">${esc(modes[k])}</div>
              </div>`,
              )
              .join("")}
          </div>`
          : "";

        // ── CSS Variables ──
        const cssHtml = t.cssVars
          ? `
          <div class="sg-section">
            <div class="sg-section-title">CSS Variables</div>
            <div class="code-block">${esc(t.cssVars)}</div>
          </div>`
          : "";

        return `
          <div class="section-header"><h2>Theme</h2></div>
          ${colorsHtml}
          ${specimensHtml}
          ${typeScaleHtml}
          ${spacingHtml}
          ${bpHtml}
          ${radiusHtml}
          ${shadowsHtml}
          ${modesHtml}
          ${cssHtml}`;
      }

      function renderStack() {
        const s = data.stack;
        const hasData = s.framework || s.language;
        if (!hasData) {
          return `
            <div class="section-header">
              <h2>Stack</h2>
            </div>
            <div class="empty-state"><p>Nog geen stack gedefinieerd.</p>
            <p style="color:var(--text-dim)">Wordt automatisch gevuld door <code>/dev-plan</code></p></div>`;
        }
        const fields = [
          ["Framework", s.framework],
          ["Language", s.language],
          ["Styling", s.styling],
          ["Database", s.db],
          ["Auth", s.auth],
          ["Hosting", s.hosting],
        ].filter(([, v]) => v);

        const cards = fields
          .map(
            ([label, value]) => `
            <div class="stat-card">
              <div class="stat-label">${esc(label)}</div>
              <div class="stat-value">${esc(value)}</div>
            </div>`,
          )
          .join("");

        const pkgs = (s.packages || [])
          .map(
            (p) => `
            <tr>
              <td style="font-weight:500;color:var(--text)">${esc(p.name)}</td>
              <td style="font-family:monospace">${esc(p.version)}</td>
              <td>${esc(p.purpose)}</td>
            </tr>`,
          )
          .join("");

        return `
          <div class="section-header">
            <h2>Stack</h2>
            <button class="edit-btn icon-btn" onclick="showResearch()" style="background:rgba(88,166,255,0.1);color:var(--accent);border-color:rgba(88,166,255,0.2)" title="Research"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
          </div>
          <div class="grid-3">${cards}</div>
          ${
            s.packages && s.packages.length
              ? `
            <div class="sub-heading">Packages</div>
            <table class="data-table">
              <thead><tr><th>Naam</th><th>Versie</th><th>Doel</th></tr></thead>
              <tbody>${pkgs}</tbody>
            </table>`
              : ""
          }`;
      }

      function showThinking(idx) {
        const e = (data.thinking || [])[idx];
        if (!e) return;
        let meta = "";
        if (e.type === "brainstorm" || e.type === "decision") {
          if (e.chosen) meta += `<strong>Gekozen:</strong> ${esc(e.chosen)}`;
          const options = e.variants || e.options || [];
          if (options.length)
            meta += `${e.chosen ? " · " : ""}<strong>Opties:</strong> ${options.map((o) => esc(o)).join(", ")}`;
        }
        if (e.type === "decision" && e.rationale) {
          meta += `<br><strong>Rationale:</strong> ${esc(e.rationale)}`;
        }
        openModal(
          e.title || "Untitled",
          `
          ${meta ? `<div class="thinking-meta" style="margin-bottom:12px">${meta}</div>` : ""}
          <div class="thinking-content">${md(e.content || "")}</div>
          ${e.source ? `<div class="thinking-source" style="margin-top:12px">${esc(e.source)}</div>` : ""}
        `,
          { readOnly: true, wide: true },
        );
      }

      function renderThinking() {
        const entries = data.thinking || [];
        if (entries.length === 0) {
          return `
            <div class="section-header">
              <h2>Thinking</h2>
            </div>
            <div class="empty-state"><p>Nog geen thinking entries.</p>
            <p style="color:var(--text-dim)">Wordt gevuld door /thinking-idea, /thinking-brainstorm, /thinking-critique en /thinking-decide</p></div>`;
        }

        // Reverse chronological (newest first)
        const sorted = [...entries]
          .map((e, i) => ({ ...e, _idx: i }))
          .reverse();

        const cards = sorted
          .map((e) => {
            let meta = "";
            if (e.type === "brainstorm" || e.type === "decision") {
              if (e.chosen) {
                meta += `<strong>Gekozen:</strong> ${esc(e.chosen)}`;
              }
              const options = e.variants || e.options || [];
              if (options.length) {
                meta += `${e.chosen ? " · " : ""}<strong>Opties:</strong> ${options.map((o) => esc(o)).join(", ")}`;
              }
            }
            if (e.type === "decision" && e.rationale) {
              meta += `<br><strong>Rationale:</strong> ${esc(e.rationale)}`;
            }

            // Truncate content for display, show full on click
            const content = e.content || "";
            const truncated =
              content.length > 300 ? content.slice(0, 300) + "..." : content;
            const needsExpand = content.length > 300;

            return `
          <div class="thinking-entry" data-type="${esc(e.type || "idea")}" style="cursor:pointer" onclick="showThinking(${e._idx})">
            <div class="thinking-header">
              <span class="thinking-type-badge" data-type="${esc(e.type || "idea")}">${esc(e.type || "idea")}</span>
              <span class="thinking-title">${esc(e.title || "Untitled")}</span>
              <span class="thinking-date">${esc(e.date || "")}</span>
            </div>
            ${meta ? `<div class="thinking-meta">${meta}</div>` : ""}
            <div class="thinking-content">${md(truncated)}${needsExpand ? ' <span style="color:var(--accent)">[meer]</span>' : ""}</div>
            <div class="thinking-source">${esc(e.source || "")}</div>
          </div>`;
          })
          .join("");

        return `
          <div class="section-header">
            <h2>Thinking</h2>
          </div>
          ${cards}`;
      }

      // ─── Edit Modals ───────────────────────────────────────

      function editConcept() {
        const c = data.concept;
        openModal(
          "Concept bewerken",
          `
          <label>Naam</label>
          <input type="text" id="f-name" value="${esc(c.name)}" />
          <label>Concept (Markdown)</label>
          <textarea id="f-content" rows="20" style="font-family:var(--font-mono);font-size:12px;line-height:1.5">${esc(c.content)}</textarea>
        `,
          {
            onSave() {
              data.concept.name = document
                .getElementById("f-name")
                .value.trim();
              data.concept.content = document.getElementById("f-content").value;
            },
          },
        );
      }

      async function showResearch() {
        try {
          const basePath = location.pathname.replace(/\/+$/, "");
          const resp = await fetch(`${basePath}/research`);
          const research = await resp.json();

          if (!research.stack && !research.architecture) {
            openModal(
              "Stack Research",
              `
              <div class="empty-state" style="margin:0">
                <p>Geen research beschikbaar.</p>
                <p style="color:var(--text-dim)">Wordt gegenereerd door <code>/core-setup</code> Phase 7</p>
              </div>
            `,
              { readOnly: true },
            );
            return;
          }

          let content = "";
          if (research.stack) {
            content += `<div class="research-content">${md(research.stack)}</div>`;
          }
          if (research.architecture) {
            content += `<h3 style="margin-top:24px;color:var(--text)">Architecture Baseline</h3>
              <div class="research-content">${md(research.architecture)}</div>`;
          }

          openModal("Stack Research", content, { readOnly: true, wide: true });
        } catch (e) {
          openModal(
            "Fout",
            `<p>Kon research niet laden: ${esc(e.message)}</p>`,
            { readOnly: true },
          );
        }
      }

      // ─── Config (CLAUDE.md) ────────────────────────────────

      let configCache = null;
      let configEditing = false;

      function renderConfig() {
        const base = location.pathname.replace(/\/+$/, "");

        if (configCache === null) {
          fetch(base + "/claude-md")
            .then((r) => r.json())
            .then((d) => {
              configCache = d.content || "";
              const el = document.querySelector(".content");
              if (el && activeTab === "config") el.innerHTML = renderConfig();
            })
            .catch(() => {
              configCache = "";
            });
          return '<div style="padding:40px;color:var(--text-dim)">Laden...</div>';
        }

        if (configEditing) {
          return `
            <div class="section-header">
              <h2>CLAUDE.md</h2>
              <div style="display:flex;gap:8px">
                <button id="config-save" class="edit-btn" style="background:rgba(88,166,255,0.1);color:var(--accent);border-color:rgba(88,166,255,0.2)">Opslaan</button>
                <button id="config-cancel" class="edit-btn">Annuleren</button>
              </div>
            </div>
            <textarea id="config-editor" style="width:100%;min-height:500px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:monospace;font-size:13px;line-height:1.6;resize:vertical;tab-size:2">${esc(configCache)}</textarea>`;
        }

        if (!configCache) {
          return `
            <div class="section-header"><h2>CLAUDE.md</h2></div>
            <div style="padding:40px;text-align:center;color:var(--text-dim)">
              <p>Geen .claude/CLAUDE.md gevonden</p>
              <button id="config-create" class="edit-btn" style="margin-top:16px;padding:8px 20px;background:rgba(88,166,255,0.1);color:var(--accent);border-color:rgba(88,166,255,0.2)">Aanmaken</button>
            </div>`;
        }

        return `
          <div class="section-header">
            <h2>CLAUDE.md</h2>
            <button id="config-edit" class="edit-btn icon-btn" title="Bewerken"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
          </div>
          <div class="research-content">${md(configCache)}</div>`;
      }

      document.addEventListener("click", (e) => {
        const base = location.pathname.replace(/\/+$/, "");

        if (e.target.id === "config-edit") {
          configEditing = true;
          render();
          return;
        }

        if (e.target.id === "config-cancel") {
          configEditing = false;
          render();
          return;
        }

        if (e.target.id === "config-create") {
          configCache = "# " + (data.concept.name || "Project") + "\n\n";
          configEditing = true;
          render();
          return;
        }

        if (e.target.id === "config-save") {
          const textarea = document.getElementById("config-editor");
          if (!textarea) return;
          const content = textarea.value;
          fetch(base + "/claude-md", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content }),
          })
            .then((r) => r.json())
            .then((d) => {
              if (d.ok) {
                configCache = content;
                configEditing = false;
                render();
              }
            })
            .catch((err) => alert("Opslaan mislukt: " + err.message));
          return;
        }
      });

      // ─── Render ─────────────────────────────────────────────

      const renderers = {
        concept: renderConcept,
        architecture: renderArchitecture,
        stack: renderStack,
        design: renderDesignContent,
        theme: renderTheme,
        thinking: renderThinking,
        config: renderConfig,
      };

      function render() {
        // Header
        let headerEl = document.querySelector("header");
        if (!headerEl) {
          headerEl = document.createElement("header");
          document.body.prepend(headerEl);
        }
        const projectName = data.concept.name || "Dashboard";
        document.title = projectName + " — Dashboard";
        headerEl.innerHTML = "";

        // Layout
        let layoutEl = document.querySelector(".layout");
        if (!layoutEl) {
          layoutEl = document.createElement("div");
          layoutEl.className = "layout";
          headerEl.after(layoutEl);
        }

        // Sidebar
        let sidebarEl = layoutEl.querySelector(".sidebar");
        if (!sidebarEl) {
          sidebarEl = document.createElement("nav");
          sidebarEl.className = "sidebar";
          layoutEl.prepend(sidebarEl);
        }

        // Hide tabs for empty optional sections
        const d = data.design || {};
        const th = data.theme || {};
        const tk = data.thinking || [];
        const hasDesign =
          (d.pages && d.pages.length) ||
          (d.flows && d.flows.length) ||
          (d.principles && d.principles.length);
        const tc = th.colors && !Array.isArray(th.colors) ? th.colors : {};
        const hasTheme =
          (tc.main && tc.main.length) ||
          (tc.accent && tc.accent.length) ||
          (tc.semantic && tc.semantic.length) ||
          (th.typography &&
            th.typography.sizes &&
            th.typography.sizes.length) ||
          th.cssVars;
        const hasThinking = tk.length > 0;
        const hiddenTabs = {};
        if (!hasDesign) hiddenTabs.design = true;
        if (!hasTheme) hiddenTabs.theme = true;
        if (!hasThinking) hiddenTabs.thinking = true;

        // Teammate role: only show concept, design, theme, stack
        if (window.__role === "teammate") {
          const allowed = {
            concept: 1,
            architecture: 1,
            design: 1,
            theme: 1,
            stack: 1,
          };
          TABS.forEach((t) => {
            if (!allowed[t.id]) hiddenTabs[t.id] = true;
          });
        }

        const visibleTabs = TABS.filter((t) => !hiddenTabs[t.id]);
        if (hiddenTabs[activeTab]) {
          activeTab = visibleTabs[0].id;
        }

        sidebarEl.innerHTML = visibleTabs
          .map(
            (t) =>
              `<a href="#${t.id}" class="${activeTab === t.id ? "active" : ""}" data-tab="${t.id}">${esc(t.label)}</a>`,
          )
          .join("");

        // Wire tab clicks
        sidebarEl.querySelectorAll("[data-tab]").forEach((a) => {
          a.addEventListener("click", (e) => {
            e.preventDefault();
            activeTab = a.dataset.tab;
            localStorage.setItem("dashboard-tab", activeTab);
            render();
          });
        });

        // Content
        let contentEl = layoutEl.querySelector(".content");
        if (!contentEl) {
          contentEl = document.createElement("main");
          contentEl.className = "content";
          layoutEl.appendChild(contentEl);
        }

        const renderer = renderers[activeTab];
        contentEl.innerHTML = renderer ? renderer() : "";

        // Teammate: hide all edit buttons
        if (window.__role === "teammate") {
          contentEl.querySelectorAll(".edit-btn").forEach((b) => {
            b.style.display = "none";
          });
        }
      }

      // ─── Init ───────────────────────────────────────────────
      mermaid.initialize({
        startOnLoad: false,
        theme: "dark",
        themeVariables: {
          darkMode: true,
          background: "#161b22",
          primaryColor: "#58a6ff",
          primaryTextColor: "#c9d1d9",
          primaryBorderColor: "#30363d",
          lineColor: "#586069",
          secondaryColor: "#1c2128",
          tertiaryColor: "#161b22",
          fontFamily:
            '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif',
        },
      });
      render();
    </script>
  </body>
</html>
