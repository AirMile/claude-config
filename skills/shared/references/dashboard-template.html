      function markdownToHtml(md) {
        return (
          md
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            // Code blocks
            .replace(
              /```(\w*)\n([\s\S]*?)```/g,
              (_, lang, code) =>
                `<pre style="background:var(--bg-dark);padding:12px;border-radius:6px;overflow-x:auto;font-size:13px;line-height:1.5;margin:8px 0"><code>${code.trim()}</code></pre>`,
            )
            // Inline code
            .replace(
              /`([^`]+)`/g,
              '<code style="background:var(--bg-dark);padding:2px 6px;border-radius:3px;font-size:13px">$1</code>',
            )
            // Headers
            .replace(
              /^#### (.+)$/gm,
              '<h4 style="color:var(--text);margin:16px 0 6px;font-size:14px">$1</h4>',
            )
            .replace(
              /^### (.+)$/gm,
              '<h3 style="color:var(--text);margin:20px 0 8px;font-size:15px">$1</h3>',
            )
            .replace(
              /^## (.+)$/gm,
              '<h2 style="color:var(--accent);margin:24px 0 10px;font-size:17px;border-bottom:1px solid var(--border);padding-bottom:6px">$1</h2>',
            )
            .replace(
              /^# (.+)$/gm,
              '<h1 style="color:var(--text);margin:0 0 16px;font-size:20px">$1</h1>',
            )
            // Bold & italic
            .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
            .replace(/\*(.+?)\*/g, "<em>$1</em>")
            // List items
            .replace(
              /^- (.+)$/gm,
              '<li style="margin:2px 0;list-style:disc;margin-left:20px">$1</li>',
            )
            .replace(
              /^  - (.+)$/gm,
              '<li style="margin:2px 0;list-style:circle;margin-left:36px">$1</li>',
            )
            // Horizontal rules
            .replace(
              /^---$/gm,
              '<hr style="border:none;border-top:1px solid var(--border);margin:16px 0">',
            )
            // Paragraphs (double newline)
            .replace(/\n\n/g, '</p><p style="margin:8px 0">')
            // Single newlines within paragraphs
            .replace(/\n/g, "<br>")
        );
      }

      function editStack() {
        const s = data.stack;
        openModal(
          "Stack bewerken",
          `
          <div class="modal-row">
            <div><label>Framework</label><input type="text" id="f-framework" value="${esc(s.framework)}" /></div>
            <div><label>Language</label><input type="text" id="f-language" value="${esc(s.language)}" /></div>
          </div>
          <div class="modal-row">
            <div><label>Styling</label><input type="text" id="f-styling" value="${esc(s.styling)}" /></div>
            <div><label>Database</label><input type="text" id="f-db" value="${esc(s.db)}" /></div>
          </div>
          <div class="modal-row">
            <div><label>Auth</label><input type="text" id="f-auth" value="${esc(s.auth)}" /></div>
            <div><label>Hosting</label><input type="text" id="f-hosting" value="${esc(s.hosting)}" /></div>
          </div>
        `,
          {
            onSave() {
              data.stack.framework = document
                .getElementById("f-framework")
                .value.trim();
              data.stack.language = document
                .getElementById("f-language")
                .value.trim();
              data.stack.styling = document
                .getElementById("f-styling")
                .value.trim();
              data.stack.db = document.getElementById("f-db").value.trim();
              data.stack.auth = document.getElementById("f-auth").value.trim();
              data.stack.hosting = document
                .getElementById("f-hosting")
                .value.trim();
            },
          },
        );
      }

      function editPackage(idx) {
        const isNew = idx === -1;
        const p = isNew
          ? { name: "", version: "", purpose: "" }
          : data.stack.packages[idx];
        openModal(
          isNew ? "Package toevoegen" : "Package bewerken",
          `
          <label>Naam</label>
          <input type="text" id="f-pkg-name" value="${esc(p.name)}" />
          <label>Versie</label>
          <input type="text" id="f-pkg-ver" value="${esc(p.version)}" placeholder="^1.0.0" />
          <label>Doel</label>
          <input type="text" id="f-pkg-purpose" value="${esc(p.purpose)}" />
        `,
          {
            deletable: !isNew,
            onSave() {
              const pkg = {
                name: document.getElementById("f-pkg-name").value.trim(),
                version: document.getElementById("f-pkg-ver").value.trim(),
                purpose: document.getElementById("f-pkg-purpose").value.trim(),
              };
              if (!pkg.name) return;
              if (!data.stack.packages) data.stack.packages = [];
              if (isNew) {
                data.stack.packages.push(pkg);
              } else {
                data.stack.packages[idx] = pkg;
              }
            },
            onDelete() {
              if (!isNew) data.stack.packages.splice(idx, 1);
            },
          },
        );
      }

      function removePackage(name) {
        data.stack.packages = (data.stack.packages || []).filter(
          (p) => p.name !== name,
        );
        syncJSON();
        render();
        toast(`${name} verwijderd`);
      }

      function editEntity(idx) {
        const isNew = idx === -1;
        const e = isNew
          ? {
              name: "",
              fields: [{ name: "", type: "", key: "" }],
              relations: [],
            }
          : JSON.parse(JSON.stringify(data.data.entities[idx]));

        const fieldsHtml = (e.fields || [])
          .map(
            (f, i) => `
          <div class="modal-list-item">
            <input type="text" value="${esc(f.name)}" style="width:100px" placeholder="Naam" data-fname="${i}" />
            <input type="text" value="${esc(f.type)}" style="width:80px" placeholder="Type" data-ftype="${i}" />
            <input type="text" value="${esc(f.key || "")}" style="width:70px" placeholder="Key" data-fkey="${i}" />
            <button class="remove-item" onclick="this.parentElement.remove()">&times;</button>
          </div>`,
          )
          .join("");

        const relsHtml = (e.relations || [])
          .map(
            (r, i) => `
          <div class="modal-list-item">
            <input type="text" value="${esc(r.target)}" style="width:120px" placeholder="Target" data-rtarget="${i}" />
            <input type="text" value="${esc(r.type)}" style="width:60px" placeholder="1:N" data-rtype="${i}" />
            <button class="remove-item" onclick="this.parentElement.remove()">&times;</button>
          </div>`,
          )
          .join("");

        openModal(
          isNew ? "Entity toevoegen" : `${esc(e.name)} bewerken`,
          `
          <label>Entity naam</label>
          <input type="text" id="f-entity-name" value="${esc(e.name)}" />
          <label>Velden</label>
          <div class="modal-list" id="f-fields">${fieldsHtml}</div>
          <button class="modal-list-add" onclick="addEntityField()">+ Veld toevoegen</button>
          <br/><br/>
          <label>Relaties</label>
          <div class="modal-list" id="f-rels">${relsHtml}</div>
          <button class="modal-list-add" onclick="addEntityRelation()">+ Relatie toevoegen</button>
        `,
          {
            deletable: !isNew,
            onSave() {
              const entity = {
                name: document.getElementById("f-entity-name").value.trim(),
                fields: [
                  ...document.querySelectorAll("#f-fields .modal-list-item"),
                ]
                  .map((row) => ({
                    name: row.querySelector("[data-fname]").value.trim(),
                    type: row.querySelector("[data-ftype]").value.trim(),
                    key:
                      row.querySelector("[data-fkey]").value.trim() ||
                      undefined,
                  }))
                  .filter((f) => f.name),
                relations: [
                  ...document.querySelectorAll("#f-rels .modal-list-item"),
                ]
                  .map((row) => ({
                    target: row.querySelector("[data-rtarget]").value.trim(),
                    type: row.querySelector("[data-rtype]").value.trim(),
                  }))
                  .filter((r) => r.target),
              };
              if (!entity.name) return;
              if (!data.data.entities) data.data.entities = [];
              if (isNew) {
                data.data.entities.push(entity);
              } else {
                data.data.entities[idx] = entity;
              }
            },
            onDelete() {
              if (!isNew) data.data.entities.splice(idx, 1);
            },
          },
        );
      }

      function addEntityField() {
        const list = document.getElementById("f-fields");
        const i = list.children.length;
        const div = document.createElement("div");
        div.className = "modal-list-item";
        div.innerHTML = `
          <input type="text" value="" style="width:100px" placeholder="Naam" data-fname="${i}" />
          <input type="text" value="" style="width:80px" placeholder="Type" data-ftype="${i}" />
          <input type="text" value="" style="width:70px" placeholder="Key" data-fkey="${i}" />
          <button class="remove-item" onclick="this.parentElement.remove()">&times;</button>`;
        list.appendChild(div);
        div.querySelector("[data-fname]").focus();
      }

      function addEntityRelation() {
        const list = document.getElementById("f-rels");
        const i = list.children.length;
        const div = document.createElement("div");
        div.className = "modal-list-item";
        div.innerHTML = `
          <input type="text" value="" style="width:120px" placeholder="Target" data-rtarget="${i}" />
          <input type="text" value="" style="width:60px" placeholder="1:N" data-rtype="${i}" />
          <button class="remove-item" onclick="this.parentElement.remove()">&times;</button>`;
        list.appendChild(div);
        div.querySelector("[data-rtarget]").focus();
      }

      function deleteEntity(idx) {
        const name = data.data.entities[idx].name;
        data.data.entities.splice(idx, 1);
        syncJSON();
        render();
        toast(`${name} verwijderd`);
      }

      function editEndpoint(idx) {
        const isNew = idx === -1;
        const e = isNew
          ? {
              method: "GET",
              path: "",
              auth: false,
              status: "planned",
              description: "",
            }
          : data.endpoints[idx];

        openModal(
          isNew ? "Endpoint toevoegen" : `${esc(e.method)} ${esc(e.path)}`,
          `
          <div class="modal-row">
            <div>
              <label>Method</label>
              <select id="f-ep-method">
                ${["GET", "POST", "PUT", "PATCH", "DELETE"].map((m) => `<option value="${m}" ${e.method === m ? "selected" : ""}>${m}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>Status</label>
              <select id="f-ep-status">
                ${["planned", "building", "done"].map((s) => `<option value="${s}" ${e.status === s ? "selected" : ""}>${s}</option>`).join("")}
              </select>
            </div>
          </div>
          <label>Path</label>
          <input type="text" id="f-ep-path" value="${esc(e.path)}" placeholder="/api/..." />
          <label>Beschrijving</label>
          <input type="text" id="f-ep-desc" value="${esc(e.description)}" />
          <label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;cursor:pointer">
            <input type="checkbox" id="f-ep-auth" ${e.auth ? "checked" : ""} style="width:auto;margin:0" />
            Authenticatie vereist
          </label>
        `,
          {
            deletable: !isNew,
            onSave() {
              const ep = {
                method: document.getElementById("f-ep-method").value,
                path: document.getElementById("f-ep-path").value.trim(),
                auth: document.getElementById("f-ep-auth").checked,
                status: document.getElementById("f-ep-status").value,
                description: document.getElementById("f-ep-desc").value.trim(),
              };
              if (!ep.path) return;
              if (!data.endpoints) data.endpoints = [];
              if (isNew) {
                data.endpoints.push(ep);
              } else {
                data.endpoints[idx] = ep;
              }
            },
            onDelete() {
              if (!isNew) data.endpoints.splice(idx, 1);
            },
          },
        );
      }

      function editFeature(idx) {
        const isNew = idx === -1;
        const f = isNew
          ? {
              name: "",
              status: "TODO",
              summary: "",
              depends: [],
              created: new Date().toISOString().slice(0, 10),
            }
          : data.features[idx];

        const statusOptions = ["TODO", "DEF", "BLT", "TST", "DONE"]
          .map(
            (s) =>
              `<option value="${s}" ${f.status === s ? "selected" : ""}>${s}</option>`,
          )
          .join("");

        const depsHtml = (f.depends || [])
          .map(
            (d, i) => `
          <div class="modal-list-item">
            <input type="text" value="${esc(d)}" data-dep="${i}" />
            <button class="remove-item" onclick="this.parentElement.remove()">&times;</button>
          </div>`,
          )
          .join("");

        openModal(
          isNew ? "Feature toevoegen" : "Feature bewerken",
          `
          <label>Naam</label>
          <input type="text" id="f-feat-name" value="${esc(f.name)}" ${!isNew ? 'readonly style="opacity:0.6"' : ""} />
          <label>Status</label>
          <select id="f-feat-status">${statusOptions}</select>
          <label>Summary</label>
          <textarea id="f-feat-summary" rows="2">${esc(f.summary || "")}</textarea>
          <label>Aangemaakt</label>
          <input type="date" id="f-feat-created" value="${esc(f.created || "")}" />
          <label>Dependencies</label>
          <div class="modal-list" id="f-deps">${depsHtml}</div>
          <button class="modal-list-add" onclick="addDepField()">+ Dependency toevoegen</button>
        `,
          {
            deletable: !isNew,
            onSave() {
              const feat = {
                name: document.getElementById("f-feat-name").value.trim(),
                status: document.getElementById("f-feat-status").value,
                summary: document.getElementById("f-feat-summary").value.trim(),
                created: document.getElementById("f-feat-created").value,
                depends: [...document.querySelectorAll("#f-deps input")]
                  .map((i) => i.value.trim())
                  .filter(Boolean),
              };
              if (!feat.name) return;
              if (!data.features) data.features = [];
              if (isNew) {
                data.features.push(feat);
              } else {
                data.features[idx] = feat;
              }
              delete featureDetailCache[feat.name];
            },
            onDelete() {
              if (!isNew) data.features.splice(idx, 1);
            },
          },
        );
      }

      function addDepField() {
        const list = document.getElementById("f-deps");
        const div = document.createElement("div");
        div.className = "modal-list-item";
        div.innerHTML = `
          <input type="text" value="" placeholder="Feature dependency" data-dep="${list.children.length}" />
          <button class="remove-item" onclick="this.parentElement.remove()">&times;</button>`;
        list.appendChild(div);
        div.querySelector("input").focus();
      }

      function editThinking(idx) {
        const isNew = idx === -1;
        const e = isNew
          ? {
              type: "idea",
              date: new Date().toISOString().slice(0, 10),
              title: "",
              content: "",
              source: "",
            }
          : data.thinking[idx];

        const typeOptions = ["idea", "brainstorm", "critique", "decision"]
          .map(
            (t) =>
              `<option value="${t}" ${e.type === t ? "selected" : ""}>${t}</option>`,
          )
          .join("");

        openModal(
          isNew ? "Thinking entry toevoegen" : "Thinking entry bewerken",
          `
          <label>Type</label>
          <select id="f-think-type">${typeOptions}</select>
          <label>Titel</label>
          <input type="text" id="f-think-title" value="${esc(e.title || "")}" />
          <label>Datum</label>
          <input type="date" id="f-think-date" value="${esc(e.date || "")}" />
          <label>Inhoud</label>
          <textarea id="f-think-content" rows="8" style="font-family:var(--font-mono);font-size:12px">${esc(e.content || "")}</textarea>
          <label>Gekozen optie (brainstorm/decision)</label>
          <input type="text" id="f-think-chosen" value="${esc(e.chosen || "")}" />
          <label>Rationale (decision)</label>
          <textarea id="f-think-rationale" rows="2">${esc(e.rationale || "")}</textarea>
          <label>Bron</label>
          <input type="text" id="f-think-source" value="${esc(e.source || "")}" placeholder="/thinking-idea" />
        `,
          {
            deletable: !isNew,
            onSave() {
              const entry = {
                type: document.getElementById("f-think-type").value,
                date: document.getElementById("f-think-date").value,
                title: document.getElementById("f-think-title").value.trim(),
                content: document.getElementById("f-think-content").value,
                source: document.getElementById("f-think-source").value.trim(),
              };
              const chosen = document
                .getElementById("f-think-chosen")
                .value.trim();
              const rationale = document
                .getElementById("f-think-rationale")
                .value.trim();
              if (chosen) entry.chosen = chosen;
              if (rationale) entry.rationale = rationale;
              if (!entry.title) return;
              if (!data.thinking) data.thinking = [];
              if (isNew) {
                data.thinking.push(entry);
              } else {
                data.thinking[idx] = entry;
              }
            },
            onDelete() {
              if (!isNew) data.thinking.splice(idx, 1);
            },
          },
        );
      }

      // ─── Render ─────────────────────────────────────────────

      const renderers = {
        concept: renderConcept,
        theme: renderTheme,
        stack: renderStack,
        data: renderData,
        endpoints: renderEndpoints,
        features: renderFeatures,
        thinking: renderThinking,
      };

      function render() {
        // Header
        let headerEl = document.querySelector("header");
        if (!headerEl) {
          headerEl = document.createElement("header");
          document.body.prepend(headerEl);
        }
        const projectName = data.concept.name || "Dashboard";
        document.title = projectName + " — Dashboard";
        headerEl.innerHTML = "";

        // Layout
        let layoutEl = document.querySelector(".layout");
        if (!layoutEl) {
          layoutEl = document.createElement("div");
          layoutEl.className = "layout";
          headerEl.after(layoutEl);
        }

        // Sidebar
        let sidebarEl = layoutEl.querySelector(".sidebar");
        if (!sidebarEl) {
          sidebarEl = document.createElement("nav");
          sidebarEl.className = "sidebar";
          layoutEl.prepend(sidebarEl);
        }

        sidebarEl.innerHTML = TABS.map(
          (t) =>
            `<a href="#${t.id}" class="${activeTab === t.id ? "active" : ""}" data-tab="${t.id}">${esc(t.label)}</a>`,
        ).join("");

        // Wire tab clicks
        sidebarEl.querySelectorAll("[data-tab]").forEach((a) => {
          a.addEventListener("click", (e) => {
            e.preventDefault();
            activeTab = a.dataset.tab;
            render();
          });
        });

        // Content
        let contentEl = layoutEl.querySelector(".content");
        if (!contentEl) {
          contentEl = document.createElement("main");
          contentEl.className = "content";
          layoutEl.appendChild(contentEl);
        }

        const renderer = renderers[activeTab];
        contentEl.innerHTML = renderer ? renderer() : "";
      }

      // ─── Init ───────────────────────────────────────────────
      render();
    </script>
  </body>
</html>
