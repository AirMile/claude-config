<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_NAME}} - {{AGENT_NAME}} {{VERSION}} (Responsive)</title>
  <style>
    /* ========================================
       WIREFRAME NAVIGATION - DO NOT MODIFY
       This ensures consistent navigation across all wireframes
       ======================================== */
    .wireframe-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-bottom: 2px solid #4a4a6a;
      font-family: Arial, sans-serif;
    }
    .wireframe-title {
      color: #fff;
      font-weight: bold;
      font-size: 13px;
    }
    .wireframe-nav-links {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .wireframe-nav-links a {
      color: #aaa;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      background: #2a2a4a;
    }
    .wireframe-nav-links a:hover {
      background: #3a3a5a;
      color: #fff;
    }
    .wireframe-nav-links a.active {
      background: #4a4a8a;
      color: #fff;
    }
    .wireframe-nav-links .sep {
      color: #4a4a6a;
      margin: 0 5px;
    }
    .wireframe-nav-links a.refined-link {
      background: #3a5a3a;
      color: #8c8;
    }
    .wireframe-nav-links a.refined-link:hover {
      background: #4a6a4a;
      color: #fff;
    }
    .wireframe-nav-links a.refined-link.active {
      background: #4a8a4a;
      color: #fff;
    }

    /* ========================================
       VIEW TOGGLE - RESPONSIVE PREVIEW
       Toggle between Phone / Desktop / Dual view
       ======================================== */
    .view-toggle {
      display: flex;
      gap: 4px;
      margin-left: 20px;
      padding-left: 20px;
      border-left: 1px solid #4a4a6a;
    }
    .view-toggle button {
      background: #2a2a4a;
      color: #aaa;
      border: none;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }
    .view-toggle button:hover {
      background: #3a3a5a;
      color: #fff;
    }
    .view-toggle button.active {
      background: #6a6a9a;
      color: #fff;
    }

    /* ========================================
       THEME INTEGRATION - CSS VARIABLES
       Default: Low-fidelity grayscale
       Override: Values from THEME.md or brand preset
       ======================================== */
    :root {
      /* Main Colors - Default Grayscale */
      --wf-dark: #333;
      --wf-light: #f5f5f5;
      --wf-mid-gray: #888;
      --wf-light-gray: #e0e0e0;

      /* Accent Colors - Default Grayscale */
      --wf-accent-primary: #666;
      --wf-accent-secondary: #777;
      --wf-accent-tertiary: #999;

      /* Typography - Default System Fonts */
      --wf-font-heading: Arial, sans-serif;
      --wf-font-body: Arial, sans-serif;
      --wf-font-mono: Consolas, monospace;

      /* Semantic Colors */
      --wf-success: #6a6;
      --wf-warning: #a86;
      --wf-error: #a66;
      --wf-info: #68a;

      /* Theme Override Section - Replace when theme available */
      {{THEME_VARIABLES}}
    }

    /* ========================================
       BASE STYLES
       ======================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--wf-font-body);
      background: var(--wf-light);
      color: var(--wf-dark);
      padding-top: 50px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-left: 20px;
      padding-right: 20px;
      padding-bottom: 20px;
    }

    /* ========================================
       RESPONSIVE CONTAINER
       Holds both phone and desktop frames
       ======================================== */
    .responsive-container {
      display: flex;
      gap: 40px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      width: 100%;
      max-width: 1700px;
      padding-top: 20px;
    }

    /* View modes */
    .responsive-container[data-view="phone"] .desktop-frame { display: none; }
    .responsive-container[data-view="desktop"] .phone-frame { display: none; }
    .responsive-container[data-view="dual"] .phone-frame,
    .responsive-container[data-view="dual"] .desktop-frame { display: flex; }

    /* Frame labels */
    .frame-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .frame-label {
      font-size: 12px;
      color: var(--wf-mid-gray);
      margin-bottom: 8px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ========================================
       PHONE FRAME (375px mobile)
       ======================================== */
    .phone-frame {
      width: 375px;
      min-height: 700px;
      background: #fff;
      border: 3px solid var(--wf-dark);
      border-radius: 32px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .status-bar {
      height: 44px;
      background: var(--wf-light-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--wf-mid-gray);
      border-bottom: 1px solid var(--wf-mid-gray);
    }

    /* ========================================
       DESKTOP FRAME (1200px max)
       ======================================== */
    .desktop-frame {
      width: 100%;
      max-width: 1000px;
      min-height: 700px;
      background: #fff;
      border: 2px solid var(--wf-mid-gray);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-shrink: 1;
    }

    .browser-bar {
      height: 36px;
      background: var(--wf-light-gray);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      border-bottom: 1px solid var(--wf-mid-gray);
    }
    .browser-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--wf-mid-gray);
    }
    .browser-dot.red { background: #e66; }
    .browser-dot.yellow { background: #ea6; }
    .browser-dot.green { background: #6a6; }
    .browser-url {
      flex: 1;
      height: 20px;
      background: #fff;
      border-radius: 4px;
      margin-left: 12px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 11px;
      color: var(--wf-mid-gray);
    }

    /* ========================================
       WIREFRAME CONTENT AREA
       Shared styles for content inside frames
       ======================================== */
    .wireframe-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* ========================================
       LOW-FIDELITY WIREFRAME COLOR CLASSES
       Use these classes for consistent wireframe styling
       ======================================== */

    /* Backgrounds */
    .wf-bg-dark { background-color: var(--wf-dark); }
    .wf-bg-light { background-color: var(--wf-light); }
    .wf-bg-mid { background-color: var(--wf-mid-gray); }
    .wf-bg-subtle { background-color: var(--wf-light-gray); }
    .wf-bg-accent { background-color: var(--wf-accent-primary); }

    /* Text */
    .wf-text-dark { color: var(--wf-dark); }
    .wf-text-light { color: var(--wf-light); }
    .wf-text-mid { color: var(--wf-mid-gray); }
    .wf-text-accent { color: var(--wf-accent-primary); }

    /* Borders */
    .wf-border { border: 1px solid var(--wf-mid-gray); }
    .wf-border-dark { border: 1px solid var(--wf-dark); }
    .wf-border-subtle { border: 1px solid var(--wf-light-gray); }

    /* Typography */
    .wf-heading {
      font-family: var(--wf-font-heading);
      font-weight: bold;
    }
    .wf-body {
      font-family: var(--wf-font-body);
    }
    .wf-mono {
      font-family: var(--wf-font-mono);
    }

    /* Accent cycling for shapes/elements */
    .wf-accent-1 { background-color: var(--wf-accent-primary); }
    .wf-accent-2 { background-color: var(--wf-accent-secondary); }
    .wf-accent-3 { background-color: var(--wf-accent-tertiary); }

    /* Placeholder elements */
    .wf-placeholder {
      background-color: var(--wf-light-gray);
      border: 2px dashed var(--wf-mid-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--wf-mid-gray);
      font-size: 12px;
    }

    .wf-image-placeholder {
      background: linear-gradient(135deg, var(--wf-light-gray) 25%, var(--wf-mid-gray) 25%, var(--wf-mid-gray) 50%, var(--wf-light-gray) 50%, var(--wf-light-gray) 75%, var(--wf-mid-gray) 75%);
      background-size: 20px 20px;
    }

    /* ========================================
       WIREFRAME CONTENT STYLES
       Agent adds component-specific styles below
       ======================================== */

    {{COMPONENT_STYLES}}

    /* ========================================
       EDIT MODE - Interactive wireframe editing
       Two sub-modes: Layout (drag/resize) and Text (edit)
       ======================================== */
    .edit-toggle {
      background: #2a2a4a;
      color: #aaa;
      border: 1px solid #4a4a6a;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      margin-left: 16px;
    }
    .edit-toggle:hover { background: #3a3a5a; color: #fff; }
    .edit-toggle.active { background: #8a4a4a; color: #fff; border-color: #a66; }

    /* Drag handle (injected dynamically into data-component elements) */
    .edit-handle {
      display: none;
      position: absolute;
      top: 4px;
      left: 4px;
      background: #4a90d9;
      color: #fff;
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 3px;
      font-family: Arial, sans-serif;
      z-index: 10;
      cursor: grab;
      user-select: none;
      white-space: nowrap;
      opacity: 0.9;
    }
    .edit-handle:hover { opacity: 1; background: #2a70b9; }
    .edit-handle:active { cursor: grabbing; }
    body.edit-mode .edit-handle { display: block; }

    /* Edit mode: component outlines */
    body.edit-mode [data-component] {
      position: relative;
      outline: 2px dashed #4a90d9;
      outline-offset: 2px;
    }
    body.edit-mode [data-component]:hover {
      outline-color: #2a70b9;
      background-color: rgba(74, 144, 217, 0.05);
    }

    /* Overflow visible on frames for outlines, relative for absolute component placement */
    body.edit-mode .phone-frame,
    body.edit-mode .desktop-frame { overflow: visible; position: relative; }

    /* Placement mode: crosshair cursor, click-through on existing components */
    body.placing-component .phone-frame,
    body.placing-component .desktop-frame { cursor: crosshair; }
    body.placing-component [data-component] { pointer-events: none; }

    /* Layout sub-mode: resize corner indicator */
    body.edit-mode.mode-layout [data-component] { cursor: grab; }
    body.edit-mode.mode-layout [data-component]:active { cursor: grabbing; }
    body.edit-mode.mode-layout [data-component]::after {
      content: '';
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 12px;
      height: 12px;
      border-right: 3px solid #4a90d9;
      border-bottom: 3px solid #4a90d9;
      pointer-events: none;
      z-index: 10;
    }

    /* Text sub-mode */
    body.edit-mode.mode-text [data-component] {
      outline-color: #d9a04a;
      cursor: text;
    }
    body.edit-mode.mode-text .edit-handle { background: #d9a04a; }
    body.edit-mode.mode-text .edit-handle:hover { background: #b98030; }
    body.edit-mode.mode-text [contenteditable="true"] {
      outline: 1px dashed #d9a04a;
      outline-offset: 1px;
      cursor: text;
    }
    body.edit-mode.mode-text [contenteditable="true"]:focus {
      outline: 2px solid #d9a04a;
      background-color: rgba(217, 160, 74, 0.08);
    }

    /* Edit toolbar (bottom) */
    .edit-toolbar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      padding: 8px 15px;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      border-top: 2px solid #4a4a6a;
      font-family: Arial, sans-serif;
    }
    body.edit-mode .edit-toolbar { display: flex; }
    .edit-toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .edit-toolbar-info { color: #aaa; font-size: 11px; }
    .edit-mode-switch {
      display: flex;
      gap: 2px;
      background: #2a2a4a;
      border-radius: 4px;
      padding: 2px;
    }
    .edit-mode-switch button {
      padding: 3px 12px;
      border-radius: 3px;
      border: none;
      font-size: 11px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      background: transparent;
      color: #888;
    }
    .edit-mode-switch button.active { background: #4a90d9; color: #fff; }
    .edit-mode-switch button[data-submode="text"].active { background: #d9a04a; color: #fff; }
    .edit-toolbar-actions { display: flex; gap: 8px; }
    .edit-toolbar-actions button {
      padding: 4px 14px;
      border-radius: 4px;
      border: none;
      font-size: 11px;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }
    .edit-btn-download { background: #4a8a4a; color: #fff; }
    .edit-btn-download:hover { background: #5a9a5a; }
    .edit-btn-reset { background: #8a4a4a; color: #fff; }
    .edit-btn-reset:hover { background: #9a5a5a; }
    .edit-btn-add { background: #4a90d9; color: #fff; font-weight: bold; }
    .edit-btn-add:hover { background: #5aa0e9; }
    .edit-btn-undo { background: #6a6a9a; color: #fff; }
    .edit-btn-undo:hover { background: #7a7aaa; }
    .edit-btn-redo { background: #6a6a9a; color: #fff; }
    .edit-btn-redo:hover { background: #7a7aaa; }
    body.edit-mode.mode-text .edit-btn-add { display: none; }
    .edit-handle-delete {
      margin-left: auto;
      background: #a44;
      color: #fff;
      border: none;
      border-radius: 3px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .edit-handle-delete:hover { background: #c44; }

  </style>
</head>
<body>
  <!-- Navigation - COPY EXACTLY, only change class="active" placement -->
  <div class="wireframe-nav">
    <span class="wireframe-title">{{PAGE_NAME}} Wireframes</span>
    <div class="wireframe-nav-links">
      <a href="../agent-a/v1.html" {{ACTIVE_A_V1}}>A v1</a>
      <a href="../agent-b/v1.html" {{ACTIVE_B_V1}}>B v1</a>
      <span class="sep">|</span>
      <a href="../agent-a/v2.html" {{ACTIVE_A_V2}}>A v2</a>
      <a href="../agent-b/v2.html" {{ACTIVE_B_V2}}>B v2</a>
      <span class="sep">|</span>
      <a href="../refined/refined.html" {{ACTIVE_REFINED}} class="refined-link">Refined</a>
    </div>
    <div class="view-toggle">
      <button data-view="phone">Phone</button>
      <button data-view="desktop">Desktop</button>
      <button data-view="dual" class="active">Dual</button>
    </div>
    <button id="edit-toggle" class="edit-toggle">Edit Mode</button>
  </div>

  <!-- Responsive Container - Shows both frames side by side -->
  <div class="responsive-container" data-view="dual">

    <!-- Phone Frame (375px) -->
    <div class="frame-wrapper">
      <span class="frame-label">Mobile (375px)</span>
      <div class="phone-frame">
        <div class="status-bar">9:41</div>
        <div class="wireframe-content">
          <!-- ========================================
               WIREFRAME CONTENT - MOBILE
               Agent builds the mobile wireframe layout here
               ======================================== -->

          {{WIREFRAME_CONTENT_MOBILE}}

        </div>
      </div>
    </div>

    <!-- Desktop Frame (1000px) -->
    <div class="frame-wrapper">
      <span class="frame-label">Desktop (1000px)</span>
      <div class="desktop-frame">
        <div class="browser-bar">
          <span class="browser-dot red"></span>
          <span class="browser-dot yellow"></span>
          <span class="browser-dot green"></span>
          <div class="browser-url">https://example.com/{{PAGE_NAME_SLUG}}</div>
        </div>
        <div class="wireframe-content">
          <!-- ========================================
               WIREFRAME CONTENT - DESKTOP
               Agent builds the desktop wireframe layout here
               ======================================== -->

          {{WIREFRAME_CONTENT_DESKTOP}}

        </div>
      </div>
    </div>

  </div>

  <!-- Edit toolbar (visible in edit mode) -->
  <div class="edit-toolbar">
    <div class="edit-toolbar-left">
      <div class="edit-mode-switch">
        <button data-submode="layout" class="active">Layout</button>
        <button data-submode="text">Text</button>
      </div>
      <span class="edit-toolbar-info">Drag to move — resize from edges</span>
    </div>
    <div class="edit-toolbar-actions">
      <button class="edit-btn-add" id="edit-add">+ Add</button>
      <button class="edit-btn-undo" id="edit-undo">Undo</button>
      <button class="edit-btn-redo" id="edit-redo">Redo</button>
      <button class="edit-btn-download" id="edit-download">Download HTML</button>
      <button class="edit-btn-reset" id="edit-reset">Reset</button>
    </div>
  </div>

  <script>
    // View toggle functionality
    document.querySelectorAll('.view-toggle button').forEach(btn => {
      btn.addEventListener('click', () => {
        // Update button states
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Update container view
        const view = btn.dataset.view;
        document.querySelector('.responsive-container').dataset.view = view;
      });
    });
  </script>

  <!-- interact.js for drag + resize -->
  <script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js"></script>
  <script>
    (function() {
      var editToggle = document.getElementById('edit-toggle');
      var downloadBtn = document.getElementById('edit-download');
      var resetBtn = document.getElementById('edit-reset');
      var addBtn = document.getElementById('edit-add');
      var subModeBtns = document.querySelectorAll('.edit-mode-switch button');
      var toolbarInfo = document.querySelector('.edit-toolbar-info');
      var editMode = false;
      var subMode = 'layout';

      // Select the active/visible frame based on view toggle state
      function getActiveFrame() {
        var rc = document.querySelector('.responsive-container');
        if (rc && rc.dataset.view === 'desktop') {
          return document.querySelector('.desktop-frame');
        }
        return document.querySelector('.phone-frame') || document.querySelector('.desktop-frame');
      }

      // Toggle edit mode on/off
      editToggle.addEventListener('click', function() {
        editMode = !editMode;
        document.body.classList.toggle('edit-mode', editMode);
        editToggle.classList.toggle('active', editMode);
        editToggle.textContent = editMode ? 'View Mode' : 'Edit Mode';

        if (editMode) {
          injectHandles();
          setSubMode('layout');
        } else {
          removeHandles();
          clearContentEditable();
          interact('[data-component]').unset();
          var frame = getActiveFrame();
          if (frame) frame.style.height = '';
          document.body.classList.remove('mode-layout', 'mode-text');
        }
      });

      // Sub-mode toggle
      subModeBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          setSubMode(btn.getAttribute('data-submode'));
        });
      });

      function setSubMode(mode) {
        // Cancel placement mode if active
        if (document.body.classList.contains('placing-component')) {
          document.body.classList.remove('placing-component');
          addBtn.disabled = false;
        }
        subMode = mode;
        document.body.classList.remove('mode-layout', 'mode-text');
        document.body.classList.add('mode-' + mode);
        subModeBtns.forEach(function(btn) {
          btn.classList.toggle('active', btn.getAttribute('data-submode') === mode);
        });

        // Lock frame height in layout mode so component resize doesn't affect the frame
        var frame = getActiveFrame();

        if (mode === 'layout') {
          if (frame) frame.style.height = frame.offsetHeight + 'px';
          clearContentEditable();
          setupInteract();
          toolbarInfo.textContent = 'Drag to move \u2014 resize from edges';
        } else {
          if (frame) frame.style.height = '';
          interact('[data-component]').unset();
          enableContentEditable();
          toolbarInfo.textContent = 'Click text to edit \u2014 Tab to next element';
        }
      }

      // Inject drag handles into data-component elements
      function injectHandles() {
        document.querySelectorAll('[data-component]').forEach(function(el) {
          if (el.closest('.wireframe-nav') || el.closest('.edit-toolbar')) return;
          if (el.querySelector('.edit-handle')) return;
          var handle = document.createElement('div');
          handle.className = 'edit-handle';
          handle.style.display = 'flex';
          handle.style.alignItems = 'center';
          handle.style.gap = '6px';

          var label = document.createElement('span');
          label.textContent = el.getAttribute('data-component');
          handle.appendChild(label);

          var delBtn = document.createElement('button');
          delBtn.className = 'edit-handle-delete';
          delBtn.textContent = '\u00d7';
          delBtn.title = 'Delete component';
          delBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm('Delete "' + el.getAttribute('data-component') + '"?')) {
              saveSnapshot();
              el.remove();
              interact('[data-component]').unset();
              setupInteract();
            }
          });
          handle.appendChild(delBtn);

          el.insertBefore(handle, el.firstChild);
        });
      }

      function removeHandles() {
        document.querySelectorAll('.edit-handle').forEach(function(el) { el.remove(); });
      }

      function enableContentEditable() {
        document.querySelectorAll('[data-component] h1, [data-component] h2, [data-component] h3, [data-component] p, [data-component] span, [data-component] label, [data-component] a, [data-component] li, [data-component] td, [data-component] th, [data-component] button').forEach(function(el) {
          if (el.closest('.wireframe-nav') || el.closest('.edit-toolbar') || el.classList.contains('edit-handle')) return;
          el.contentEditable = 'true';
        });
      }

      function clearContentEditable() {
        document.querySelectorAll('[contenteditable]').forEach(function(el) {
          el.removeAttribute('contenteditable');
        });
      }

      function setupInteract() {
        // Both drag and resize on the same element:
        // - Cursor near edges (within margin 20px) → resize
        // - Cursor in center area → drag
        interact('[data-component]')
          .draggable({
            inertia: true,
            listeners: {
              start: function() { saveSnapshot(); },
              move: function(event) {
                var target = event.target;
                var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                target.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
              }
            }
          })
          .resizable({
            edges: { left: true, right: true, bottom: true, top: true },
            margin: 20,
            modifiers: [
              interact.modifiers.restrictSize({ min: { width: 60, height: 30 } })
            ],
            listeners: {
              start: function() { saveSnapshot(); },
              move: function(event) {
                var target = event.target;
                var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.deltaRect.left;
                var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.deltaRect.top;
                target.style.width = event.rect.width + 'px';
                target.style.height = event.rect.height + 'px';
                target.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
              }
            }
          });
      }

      // Add new component via click-to-place
      addBtn.addEventListener('click', function() {
        if (document.body.classList.contains('placing-component')) return;
        var name = prompt('Component name:');
        if (!name || !name.trim()) return;
        name = name.trim();

        var container = getActiveFrame();
        if (!container) return;

        // Enter placement mode
        document.body.classList.add('placing-component');
        addBtn.disabled = true;
        toolbarInfo.textContent = 'Click on the wireframe to place "' + name + '" — Esc to cancel';

        function placeComponent(e) {
          var rect = container.getBoundingClientRect();
          var x = e.clientX - rect.left;
          var y = e.clientY - rect.top;

          var comp = document.createElement('div');
          comp.setAttribute('data-component', name);
          comp.setAttribute('data-atomic', 'organism');
          comp.style.position = 'absolute';
          comp.style.left = x + 'px';
          comp.style.top = y + 'px';
          comp.style.width = '220px';
          comp.style.minHeight = '60px';
          comp.style.border = '1px solid #ccc';
          comp.style.padding = '16px';
          comp.style.background = '#fafafa';
          comp.innerHTML = '<p style="color:#999; font-style:italic;">' + name + '</p>';

          saveSnapshot();
          container.appendChild(comp);
          injectHandles();

          // Re-setup interact to include the new component
          interact('[data-component]').unset();
          setupInteract();

          exitPlacement();
        }

        function cancelPlacement(e) {
          if (e.key === 'Escape') exitPlacement();
        }

        function exitPlacement() {
          document.body.classList.remove('placing-component');
          addBtn.disabled = false;
          toolbarInfo.textContent = 'Drag to move \u2014 resize from edges';
          container.removeEventListener('click', placeComponent);
          document.removeEventListener('keydown', cancelPlacement);
        }

        container.addEventListener('click', placeComponent);
        document.addEventListener('keydown', cancelPlacement);
      });

      // Undo system
      var undoStack = [];
      var redoStack = [];
      var MAX_UNDO = 20;

      function saveSnapshot() {
        var container = getActiveFrame();
        if (!container) return;
        undoStack.push(container.innerHTML);
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        redoStack.length = 0;
      }

      function undo() {
        if (undoStack.length === 0) return;
        var container = getActiveFrame();
        if (!container) return;
        redoStack.push(container.innerHTML);
        interact('[data-component]').unset();
        container.innerHTML = undoStack.pop();
        injectHandles();
        if (subMode === 'layout') setupInteract();
      }

      function redo() {
        if (redoStack.length === 0) return;
        var container = getActiveFrame();
        if (!container) return;
        undoStack.push(container.innerHTML);
        if (undoStack.length > MAX_UNDO) undoStack.shift();
        interact('[data-component]').unset();
        container.innerHTML = redoStack.pop();
        injectHandles();
        if (subMode === 'layout') setupInteract();
      }

      document.addEventListener('keydown', function(e) {
        if (!editMode) return;
        var key = e.key.toLowerCase();
        if ((e.ctrlKey || e.metaKey) && key === 'z' && e.shiftKey) {
          e.preventDefault();
          redo();
        } else if ((e.ctrlKey || e.metaKey) && key === 'z' && !e.shiftKey) {
          e.preventDefault();
          undo();
        } else if ((e.ctrlKey || e.metaKey) && key === 'y') {
          e.preventDefault();
          redo();
        }
      });

      // Undo/Redo buttons
      var undoBtn = document.getElementById('edit-undo');
      undoBtn.addEventListener('click', function() { undo(); });
      var redoBtn = document.getElementById('edit-redo');
      redoBtn.addEventListener('click', function() { redo(); });

      // Clean/restore edit artifacts from components
      function cleanComponentStyles() {
        document.querySelectorAll('[data-component]').forEach(function(el) {
          el.style.transform = '';
          el.style.width = '';
          el.style.height = '';
          el.style.position = '';
          el.style.left = '';
          el.style.top = '';
          el.removeAttribute('data-x');
          el.removeAttribute('data-y');
        });
      }

      // Download modified HTML
      downloadBtn.addEventListener('click', function() {
        document.body.classList.remove('edit-mode', 'mode-layout', 'mode-text');
        editToggle.classList.remove('active');
        clearContentEditable();
        removeHandles();
        cleanComponentStyles();

        var toolbar = document.querySelector('.edit-toolbar');
        toolbar.style.display = 'none';
        var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

        toolbar.style.display = '';
        document.body.classList.add('edit-mode', 'mode-' + subMode);
        editToggle.classList.add('active');
        editToggle.textContent = 'View Mode';
        injectHandles();
        if (subMode === 'layout') setupInteract();
        else enableContentEditable();

        var blob = new Blob([html], { type: 'text/html' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'wireframe-edited.html';
        a.click();
        URL.revokeObjectURL(url);
      });

      // Reset
      resetBtn.addEventListener('click', function() {
        if (confirm('Reset all changes? This will reload the original wireframe.')) {
          window.location.reload();
        }
      });
    })();
  </script>
</body>
</html>
